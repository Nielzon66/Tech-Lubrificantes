<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
}

.topo{

background:#0d0d0d;

padding:15px;

display:flex;

align-items:center;

gap:10px;

}

.voltar{

background:#16a36d;

border:none;

padding:8px 15px;

border-radius:8px;

color:white;

cursor:pointer;

}

.container{
padding:20px;
}

.carro{
background:white;
color:black;
border-radius:20px;
padding:20px;
}

.carro img{
width:100%;
border-radius:15px;
}

.bloco{
background:#1f1f1f;
padding:15px;
border-radius:10px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="topo">

<button class="voltar" onclick="voltar()">
⬅ Voltar
</button>

</div>

<div class="container">

<div class="carro">

<img src="https://source.unsplash.com/600x400/?car">

<h2 id="nome"></h2>

</div>

<div class="bloco">
Óleo recomendado: 5W30
</div>

<div class="bloco">
Capacidade: 3.5 litros
</div>

<div class="bloco">
Filtro de óleo: WEGA WO123
</div>

<div class="bloco">
Filtro de ar: WEGA FA456
</div>

</div>

<script>

const dados=JSON.parse(localStorage.getItem("veiculo"));

document.getElementById("nome").innerText=

dados.marca+" "+dados.modelo;

function voltar(){

window.history.back();

}

</script>

</body>
</html>
