<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{

margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;

}

.topo{

background:#111;
padding:15px;
display:flex;
align-items:center;

}

.voltar{

background:#1dbf73;
border:none;
padding:8px 14px;
border-radius:8px;
color:white;
margin-right:10px;

}

.container{

padding:20px;

}

.card{

background:white;
color:black;
border-radius:18px;
padding:18px;

}

.card img{

width:100%;
border-radius:12px;

}

.info{

background:#1b1b1b;
padding:14px;
border-radius:10px;
margin-top:10px;

}

</style>
</head>

<body>

<div class="topo">

<button class="voltar" onclick="voltar()">
⬅
</button>

<div id="titulo"></div>

</div>

<div class="container">

<div class="card">

<img src="https://source.unsplash.com/800x500/?car">

<h2 id="nome"></h2>

</div>

<div class="info">Óleo recomendado: 5W30 Sintético</div>

<div class="info">Capacidade: 3.5L</div>

<div class="info">Filtro de óleo: WEGA WO123</div>

<div class="info">Filtro de ar: WEGA FA456</div>

</div>

<script>

const dados=JSON.parse(localStorage.getItem("veiculo"))

document.getElementById("nome").innerText=
dados.marca+" "+dados.modelo

document.getElementById("titulo").innerText=
dados.marca

function voltar(){

window.history.back()

}

</script>

</body>
</html>
