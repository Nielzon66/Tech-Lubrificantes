<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta Veicular Avançada</title>
<style>
body { font-family: Arial, sans-serif; background:#f4f4f4; margin:0; padding:0; }
header { background:#222; color:white; padding:15px; text-align:center; }
.container { max-width:900px; margin:30px auto; background:white; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1); }
input, select, button { width:100%; padding:10px; margin:8px 0; border-radius:5px; border:1px solid #ccc; }
button { background:#007bff; color:white; border:none; cursor:pointer; }
button:disabled { background:#999; cursor:not-allowed; }
.result { margin-top:20px; padding:15px; background:#e9ecef; border-radius:8px; white-space:pre-wrap; }
.suggestions { border:1px solid #ccc; background:white; max-height:250px; overflow-y:auto; position:absolute; z-index:10; width:calc(100% - 22px); }
.suggestion-item { padding:5px; cursor:pointer; }
.suggestion-item:hover, .suggestion-active { background:#007bff; color:white; }
.relative { position:relative; }
.filter-row { display:flex; gap:10px; flex-wrap:wrap; }
.filter-row select { flex:1; }
</style>
</head>
<body>
<header><h1>Consulta Veicular Avançada</h1></header>

<div class="container">

<label>Tipo de veículo:</label>
<select id="tipoVeiculo">
  <option value="carros">Carros</option>
  <option value="caminhoes">Caminhões</option>
</select>

<label>Marca:</label>
<select id="marca"></select>

<label>Modelo:</label>
<div class="relative">
<input type="text" id="modelo" placeholder="Digite o modelo..." autocomplete="off">
<div id="sugestoes" class="suggestions" style="display:none;"></div>
</div>

<div class="filter-row">
<div>
<label>Motor:</label>
<select id="motor" disabled>
  <option value="">Selecione o motor...</option>
  <option value="1.0">1.0</option>
  <option value="1.2">1.2</option>
  <option value="1.4">1.4</option>
  <option value="1.6">1.6</option>
  <option value="2.0">2.0</option>
  <option value="2.8">2.8</option>
  <option value="3.2">3.2</option>
  <option value="Turbo">Turbo</option>
</select>
</div>
<div>
<label>Ano:</label>
<select id="ano" disabled></select>
</div>
</div>

<button id="btnBuscar" onclick="buscarInfo()" disabled>Consultar Especificações</button>

<div class="result" id="resultado"></div>
</div>

<script>
const filtrosMarcas = ['Tecfil','Wega','Fram'];
let marcasData = {};
let modelosData = {};
let anosData = {};

// Carregar marcas
async function carregarMarcas() {
  const tipo = document.getElementById('tipoVeiculo').value;
  const sel = document.getElementById('marca');
  sel.innerHTML = '<option value="">Carregando marcas...</option>';
  try {
    const res = await fetch(`https://brasilapi.com.br/api/fipe/marcas/v1/${tipo}`);
    const marcas = await res.json();
    sel.innerHTML = '<option value="">Selecione uma marca...</option>';
    marcas.forEach(m => {
      const option = new Option(m.nome, m.codigo);
      sel.appendChild(option);
      marcasData[m.codigo] = m.nome;
    });
  } catch(e) {
    console.error('Erro ao carregar marcas:', e);
    sel.innerHTML = '<option value="">Erro ao carregar marcas</option>';
  }
}

// Autocomplete modelo com carregamento de anos ao clicar
const modeloInput = document.getElementById('modelo');
const sugestoesBox = document.getElementById('sugestoes');

modeloInput.addEventListener('input', async () => {
  const marcaCodigo = document.getElementById('marca').value;
  if (!marcaCodigo) return;
  if (!modelosData[marcaCodigo]) {
    try {
      const res = await fetch(`https://brasilapi.com.br/api/fipe/veiculos/marcas/${marcaCodigo}/modelos`);
      const data = await res.json();
      modelosData[marcaCodigo] = data.modelos;
    } catch(e) {console.error(e); return;}
  }

  const termo = modeloInput.value.toLowerCase();
  const modelos = modelosData[marcaCodigo]
      .filter(m => m.nome.toLowerCase().includes(termo))
      .slice(0,20);

  sugestoesBox.innerHTML = '';
  if (modelos.length && termo.length > 0) {
    modelos.forEach(m => {
      const div = document.createElement('div');
      div.classList.add('suggestion-item');
      div.innerHTML = `<strong>${m.nome}</strong>`;
      div.addEventListener('click', async () => {
        modeloInput.value = m.nome;
        const selAno = document.getElementById('ano');
        selAno.innerHTML = '<option value="">Carregando anos...</option>';
        if (!anosData[m.codigo]) {
          try {
            const resAno = await fetch(`https://brasilapi.com.br/api/fipe/veiculos/marcas/${marcaCodigo}/modelos/${m.codigo}/anos`);
            anosData[m.codigo] = await resAno.json();
          } catch(e){console.error(e); selAno.innerHTML='<option value="">Erro</option>'; return;}
        }
        selAno.innerHTML = '<option value="">Selecione o ano...</option>';
        anosData[m.codigo].forEach(a => selAno.appendChild(new Option(a.nome, a.codigo)));
        selAno.disabled = false;
        sugestoesBox.style.display='none';
        checarPronto();
      });
      sugestoesBox.appendChild(div);
    });
    sugestoesBox.style.display='block';
  } else {
    sugestoesBox.style.display='none';
  }
});

// Checar se botão pode ser habilitado
function checarPronto() {
  const motor = document.getElementById('motor').value;
  const ano = document.getElementById('ano').value;
  const modelo = modeloInput.value;
  const marca = document.getElementById('marca').value;
  document.getElementById('btnBuscar').disabled = !(motor && ano && modelo && marca);
}
document.getElementById('motor').addEventListener('change', checarPronto);
document.getElementById('ano').addEventListener('change', checarPronto);

// Buscar info e exibir filtros
function buscarInfo() {
  const tipo = document.getElementById('tipoVeiculo').value;
  const marcaCodigo = document.getElementById('marca').value;
  const marcaNome = marcasData[marcaCodigo];
  const modeloNome = modeloInput.value;
  const anoCodigo = document.getElementById('ano').value;
  const motor = document.getElementById('motor').value;

  let resultadoText = `Tipo: ${tipo}\nMarca: ${marcaNome}\nModelo: ${modeloNome}\nAno: ${anoCodigo}\nMotor: ${motor}\n\n`;
  filtrosMarcas.forEach(f => {
    resultadoText += `-- Filtros ${f} --\nÓleo: API SP 5W-30\nAr: ${f} AR\nCombustível: ${f} FC\nCabine: ${f} CB\n\n`;
  });
  resultadoText += `Intervalo de troca de óleo: 10000 km\nIntervalo de troca de filtros: 15000 km`;
  document.getElementById('resultado').innerText = resultadoText;
}

// Resetar campos ao trocar tipo ou marca
document.getElementById('tipoVeiculo').addEventListener('change', () => {
  modeloInput.value='';
  document.getElementById('ano').innerHTML='<option value="">---</option>';
  document.getElementById('ano').disabled=true;
  document.getElementById('motor').value='';
  document.getElementById('btnBuscar').disabled=true;
  carregarMarcas();
});
document.getElementById('marca').addEventListener('change', () => {
  modeloInput.value='';
  document.getElementById('ano').innerHTML='<option value="">---</option>';
  document.getElementById('ano').disabled=true;
  document.getElementById('motor').value='';
  document.getElementById('btnBuscar').disabled=true;
});

carregarMarcas();
</script>
</body>
</html>
