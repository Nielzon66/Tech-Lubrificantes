<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta Veicular</title>
<style>
body { font-family: Arial, sans-serif; background:#f4f4f4; margin:0; padding:0; }
header { background:#222; color:white; padding:15px; text-align:center; }
.container { max-width:900px; margin:30px auto; background:white; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1); }
select, button { width:100%; padding:10px; margin:8px 0; border-radius:5px; border:1px solid #ccc; }
button { background:#007bff; color:white; border:none; cursor:pointer; }
button:disabled { background:#999; cursor:not-allowed; }
.result { margin-top:20px; padding:15px; background:#e9ecef; border-radius:8px; white-space:pre-wrap; }
</style>
</head>
<body>
<header><h1>Consulta Veicular</h1></header>

<div class="container">
<label>Marca:</label>
<select id="marca"><option value="">Carregando marcas...</option></select>

<label>Modelo:</label>
<select id="modelo" disabled><option value="">Selecione uma marca primeiro</option></select>

<label>Ano:</label>
<select id="ano" disabled><option value="">Selecione o modelo primeiro</option></select>

<label>Motor:</label>
<select id="motor" disabled><option value="">Selecione o ano primeiro</option></select>

<button id="btnBuscar" onclick="buscarInfo()" disabled>Consultar Especificações</button>

<div class="result" id="resultado"></div>
</div>

<script>
const apiBase = 'https://parallelum.com.br/fipe/api/v1/carros'; // API FIPE pública

// 🔹 Carregar marcas reais via API
async function carregarMarcas() {
    const sel = document.getElementById('marca');
    sel.innerHTML = '<option value="">Carregando marcas...</option>';
    try {
        const res = await fetch(`${apiBase}/marcas`);
        const marcas = await res.json();
        sel.innerHTML = '<option value="">Selecione uma marca...</option>';
        marcas.forEach(m => sel.appendChild(new Option(m.nome, m.codigo)));
        sel.disabled = false;
    } catch(e) {
        sel.innerHTML = '<option value="">Erro ao carregar marcas</option>';
    }
}

// Carregar modelos via API
async function carregarModelos() {
    const marca = document.getElementById('marca').value;
    const selModelo = document.getElementById('modelo');
    const selAno = document.getElementById('ano');
    const selMotor = document.getElementById('motor');

    selModelo.innerHTML = '<option value="">Carregando modelos...</option>';
    selAno.innerHTML = '<option value="">Selecione o modelo...</option>';
    selMotor.innerHTML = '<option value="">Selecione o ano...</option>';
    document.getElementById('btnBuscar').disabled = true;

    if (!marca) { selModelo.disabled = true; return; }

    try {
        const res = await fetch(`${apiBase}/marcas/${marca}/modelos`);
        const data = await res.json();
        selModelo.innerHTML = '<option value="">Selecione o modelo...</option>';
        data.modelos.forEach(m => selModelo.appendChild(new Option(m.nome, m.codigo)));
        selModelo.disabled = false;
        selAno.disabled = true;
        selMotor.disabled = true;
    } catch(e) {
        selModelo.innerHTML = '<option value="">Erro ao carregar modelos</option>';
    }
}

// Carregar anos via API
async function carregarAnos() {
    const marca = document.getElementById('marca').value;
    const modelo = document.getElementById('modelo').value;
    const selAno = document.getElementById('ano');
    const selMotor = document.getElementById('motor');

    selAno.innerHTML = '<option value="">Carregando anos...</option>';
    selMotor.innerHTML = '<option value="">Selecione o ano...</option>';
    document.getElementById('btnBuscar').disabled = true;

    if (!modelo) { selAno.disabled = true; return; }

    try {
        const res = await fetch(`${apiBase}/marcas/${marca}/modelos/${modelo}/anos`);
        const anos = await res.json();
        selAno.innerHTML = '<option value="">Selecione o ano...</option>';
        anos.forEach(a => selAno.appendChild(new Option(a.nome, a.codigo)));
        selAno.disabled = false;
        selMotor.disabled = true;
    } catch(e) {
        selAno.innerHTML = '<option value="">Erro ao carregar anos</option>';
    }
}

// Carregar motores (simulado, pois FIPE não retorna motor)
function carregarMotores() {
    const selMotor = document.getElementById('motor');
    const motoresDisponiveis = ['1.0','1.2','1.4','1.6','2.0','Turbo'];
    selMotor.innerHTML = '<option value="">Selecione o motor...</option>';
    motoresDisponiveis.forEach(m => selMotor.appendChild(new Option(m, m)));
    selMotor.disabled = false;
    document.getElementById('btnBuscar').disabled = true;
}

// Habilitar botão
function checarPronto() {
    document.getElementById('btnBuscar').disabled = !document.getElementById('motor').value;
}

// Busca info final (simulada)
function buscarInfo() {
    const marcaText  = document.getElementById('marca').selectedOptions[0].text;
    const modeloText = document.getElementById('modelo').selectedOptions[0].text;
    const anoText    = document.getElementById('ano').selectedOptions[0].text;
    const motor      = document.getElementById('motor').value;

    document.getElementById('resultado').innerText =
        `Marca: ${marcaText}\nModelo: ${modeloText}\nAno: ${anoText}\nMotor: ${motor}\nPotência: 120 hp\nTorque: 160 Nm\nÓleo: API SP 5W-30`;
}

// Eventos
window.addEventListener('DOMContentLoaded', carregarMarcas);
document.getElementById('marca').addEventListener('change', carregarModelos);
document.getElementById('modelo').addEventListener('change', carregarAnos);
document.getElementById('ano').addEventListener('change', carregarMotores);
document.getElementById('motor').addEventListener('change', checarPronto);
</script>
</body>
</html>
