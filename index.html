<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta Veicular</title>

<style>
body { font-family: Arial; background:#f4f4f4; }
.container { max-width:900px; margin:auto; background:#fff; padding:20px; border-radius:10px; }
input, select { width:100%; padding:10px; margin:8px 0; }
.relative { position:relative; }
.suggestions { position:absolute; background:#fff; border:1px solid #ccc; max-height:200px; overflow:auto; width:100%; display:none; }
.suggestion-item { padding:6px; cursor:pointer; }
.suggestion-item:hover { background:#007bff; color:#fff; }
</style>
</head>

<body>

<div class="container">

<h2>Consulta Veicular</h2>

<label>Tipo</label>
<select id="tipo">
  <option value="carros">Carros</option>
  <option value="motos">Motos</option>
  <option value="caminhoes">Caminhões</option>
</select>

<label>Marca</label>
<select id="marca"></select>

<label>Modelo</label>
<div class="relative">
<input id="modelo" placeholder="Digite o modelo">
<div id="sugestoes" class="suggestions"></div>
</div>

<label>Ano</label>
<select id="ano"></select>

</div>

<script>
let modelos = [];

// 🔥 CARREGAR MARCAS
async function carregarMarcas() {
  const tipo = document.getElementById('tipo').value;
  const sel = document.getElementById('marca');

  sel.innerHTML = '<option>Carregando...</option>';

  try {
    const res = await fetch(`https://parallelum.com.br/fipe/api/v1/${tipo}/marcas`);
    const data = await res.json();

    sel.innerHTML = '<option value="">Selecione a marca</option>';

    data.forEach(m => {
      sel.appendChild(new Option(m.nome, m.codigo));
    });

  } catch (e) {
    sel.innerHTML = '<option>Erro ao carregar</option>';
    console.error(e);
  }
}

// 🔥 CARREGAR MODELOS
document.getElementById('marca').addEventListener('change', async () => {
  const tipo = document.getElementById('tipo').value;
  const marca = document.getElementById('marca').value;

  if (!marca) return;

  try {
    const res = await fetch(`https://parallelum.com.br/fipe/api/v1/${tipo}/${marca}/modelos`);
    const data = await res.json();

    modelos = data.modelos || [];

  } catch (e) {
    console.error(e);
  }
});

// 🔥 AUTOCOMPLETE
const input = document.getElementById('modelo');
const box = document.getElementById('sugestoes');

input.addEventListener('input', () => {
  const termo = input.value.toLowerCase();

  const lista = modelos.filter(m =>
    m.nome.toLowerCase().includes(termo)
  );

  box.innerHTML = '';

  lista.slice(0, 20).forEach(m => {
    const div = document.createElement('div');
    div.className = 'suggestion-item';
    div.innerText = m.nome;

    div.onclick = async () => {
      input.value = m.nome;
      box.style.display = 'none';

      const tipo = document.getElementById('tipo').value;
      const marca = document.getElementById('marca').value;

      const res = await fetch(`https://parallelum.com.br/fipe/api/v1/${tipo}/${marca}/${m.codigo}/anos`);
      const anos = await res.json();

      const selAno = document.getElementById('ano');
      selAno.innerHTML = '';

      anos.forEach(a => {
        selAno.appendChild(new Option(a.nome, a.codigo));
      });
    };

    box.appendChild(div);
  });

  box.style.display = lista.length ? 'block' : 'none';
});

// 🔄 RECARREGAR
document.getElementById('tipo').addEventListener('change', carregarMarcas);

carregarMarcas();
</script>

</body>
</html>
