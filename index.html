<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta Veicular PRO</title>

<style>
body { font-family: Arial; background:#0f172a; color:#fff; }
.container { max-width:900px; margin:auto; padding:15px; }
.card { background:#1e293b; padding:15px; border-radius:12px; }

input, select, button {
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}

button { background:#2563eb; color:#fff; }

.result-card img { width:100%; height:200px; object-fit:cover; }
</style>
</head>

<body>

<div class="container">

<div class="card">

<select id="tipo">
<option value="carros">Carros</option>
</select>

<select id="marca"></select>

<input id="modelo" placeholder="Modelo">

<select id="motor">
<option value="1.0">1.0</option>
<option value="1.6">1.6</option>
<option value="2.0">2.0</option>
</select>

<select id="marcaFiltro">
<option value="wega">Wega</option>
<option value="tecfil">Tecfil</option>
</select>

<button id="btnBuscar">Consultar</button>

</div>

<div id="resultado"></div>

</div>

<script>
let banco = {};

fetch("filtros.json")
.then(r=>r.json())
.then(data=>{
  banco = data;
});

// 🔥 BUSCA REAL
document.getElementById('btnBuscar').onclick = ()=>{

  const modelo = document.getElementById('modelo').value.toLowerCase();
  const motor = document.getElementById('motor').value;
  const filtro = document.getElementById('marcaFiltro').value;

  const chave = modelo + " " + motor;

  const dados = banco[chave]?.[filtro];

  if(!dados){
    alert("Filtro não encontrado no banco");
    return;
  }

  const imagem = `https://tse1.mm.bing.net/th?q=${modelo}+carro`;

  document.getElementById('resultado').innerHTML = `
    <div class="result-card">
      <img src="${imagem}">
      <p>Óleo: ${dados.oleo}</p>
      <p>Ar: ${dados.ar}</p>
      <p>Combustível: ${dados.combustivel}</p>
      <p>Cabine: ${dados.cabine}</p>
    </div>
  `;
};
</script>

</body>
</html>
