<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tech Lubrificantes</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0e14;
    --surface: #131820;
    --surface2: #1a2130;
    --border: #1f2d3d;
    --accent: #f5a623;
    --accent2: #e8890e;
    --blue: #2d8bff;
    --green: #22c97a;
    --red: #ff4d4d;
    --text: #eaf0fb;
    --muted: #7a8fa6;
    --card: #161e2b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 38px;
    height: 38px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }
  .logo-text {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 0.5px;
  }
  .logo-text span { color: var(--accent); }
  .header-badge {
    background: var(--accent);
    color: #000;
    font-size: 11px;
    font-weight: 800;
    padding: 3px 9px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  /* TABS */
  .tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    gap: 0;
  }
  .tab {
    flex: 1;
    padding: 12px 8px;
    text-align: center;
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all .2s;
    letter-spacing: 0.3px;
  }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .tab-icon { font-size: 16px; display: block; margin-bottom: 2px; }

  /* CONTENT */
  .content { padding: 20px; padding-bottom: 90px; }
  .page { display: none; }
  .page.active { display: block; animation: fadeIn .3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* SECTION TITLE */
  .section-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .section-title span { color: var(--accent); }
  .section-sub {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 20px;
  }

  /* SELECT */
  .form-group { margin-bottom: 14px; }
  .form-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
    display: block;
  }
  select, input {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    color: var(--text);
    padding: 13px 16px;
    border-radius: 12px;
    font-size: 15px;
    font-family: 'Nunito', sans-serif;
    font-weight: 600;
    appearance: none;
    -webkit-appearance: none;
    transition: border-color .2s;
    outline: none;
  }
  select:focus, input:focus {
    border-color: var(--accent);
  }
  .select-wrapper {
    position: relative;
  }
