<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta Veicular PRO</title>

<style>

body{
font-family:Arial;
background:#000;
color:#fff;
margin:0;
}

.container{
max-width:900px;
margin:auto;
padding:15px;
}

h2{
text-align:center;
margin-bottom:20px;
}

/* CARD PRINCIPAL */

.card{
background:#2b2b2b;
padding:15px;
border-radius:20px;
margin-bottom:20px;
}

input,select{
width:100%;
padding:14px;
margin:8px 0;
border-radius:12px;
border:none;
background:#3a3a3a;
color:#fff;
font-size:15px;
}

/* BOTÃO */

button{
width:100%;
padding:15px;
border-radius:12px;
border:none;
background:linear-gradient(90deg,#0f9d6c,#18c58f);
color:#fff;
font-size:16px;
cursor:pointer;
font-weight:bold;
}

/* RESULTADOS */

.result-card{

background:#f1f1f1;
color:#000;
border-radius:18px;
padding:20px;
margin-bottom:20px;

}

.result-card h3{
margin:0 0 10px;
}

.result-card p{
margin:4px 0;
font-size:14px;
}

.visualizar{

margin-top:15px;

background:linear-gradient(90deg,#0f9d6c,#18c58f);

border:none;

color:white;

padding:12px;

width:100%;

border-radius:10px;

font-weight:bold;

cursor:pointer;

}

/* MARCAS */

.marca-item{

display:flex;

align-items:center;

gap:10px;

padding:10px;

background:#3a3a3a;

border-radius:10px;

margin:5px 0;

cursor:pointer;

}

.marca-item img{

width:35px;

height:35px;

object-fit:contain;

}

</style>
</head>

<body>

<div class="container">

<h2>🚗 Consulta Veicular</h2>

<div class="card">

<select id="tipo">
<option value="carros">Carros</option>
<option value="motos">Motos</option>
<option value="caminhoes">Caminhões</option>
</select>

<select id="marca"></select>

<input id="modelo" placeholder="Ex: Onix 1.0">

<select id="ano"></select>

<button id="btnBuscar">🔎 Pesquisar</button>

</div>

<div id="resultado"></div>

</div>

<script>

const tipo=document.getElementById("tipo");
const marca=document.getElementById("marca");
const modelo=document.getElementById("modelo");
const ano=document.getElementById("ano");
const resultado=document.getElementById("resultado");

let modelos=[];

/* MARCAS COMUNS */

const marcasPermitidas=[
"Chevrolet",
"Volkswagen",
"Fiat",
"Toyota",
"Honda",
"Hyundai",
"Renault",
"Nissan",
"Jeep",
"Peugeot",
"Citroen",
"Ford",
"Mitsubishi",
"Kia",
"Chery",
"Ram",
"Suzuki"
];

/* LOGOS DAS MARCAS */

const logos={
"Chevrolet":"https://logo.clearbit.com/chevrolet.com",
"Volkswagen":"https://logo.clearbit.com/vw.com",
"Fiat":"https://logo.clearbit.com/fiat.com",
"Toyota":"https://logo.clearbit.com/toyota.com",
"Honda":"https://logo.clearbit.com/honda.com",
"Hyundai":"https://logo.clearbit.com/hyundai.com",
"Renault":"https://logo.clearbit.com/renault.com",
"Nissan":"https://logo.clearbit.com/nissan.com",
"Jeep":"https://logo.clearbit.com/jeep.com",
"Peugeot":"https://logo.clearbit.com/peugeot.com",
"Citroen":"https://logo.clearbit.com/citroen.com",
"Ford":"https://logo.clearbit.com/ford.com",
"Mitsubishi":"https://logo.clearbit.com/mitsubishi-motors.com",
"Kia":"https://logo.clearbit.com/kia.com",
"Chery":"https://logo.clearbit.com/cheryinternational.com",
"Ram":"https://logo.clearbit.com/ramtrucks.com",
"Suzuki":"https://logo.clearbit.com/suzuki.com"
};

async function carregarMarcas(){

const r=await fetch(`https://parallelum.com.br/fipe/api/v1/${tipo.value}/marcas`);

const data=await r.json();

marca.innerHTML="<option>Selecione a marca</option>";

data
.filter(m =>
marcasPermitidas.some(p =>
m.nome.toLowerCase().includes(p.toLowerCase())
))
.forEach(m=>{

marca.innerHTML+=`<option value="${m.codigo}">${m.nome}</option>`;

});

}

marca.addEventListener("change",async()=>{

const r=await fetch(`https://parallelum.com.br/fipe/api/v1/${tipo.value}/marcas/${marca.value}/modelos`);

const data=await r.json();

modelos=data.modelos;

});

document.getElementById("btnBuscar").addEventListener("click",()=>{

resultado.innerHTML="";

const marcaNome=marca.options[marca.selectedIndex].text;

const logo=Object.keys(logos).find(m=>marcaNome.includes(m));

const logoUrl=logos[logo];

modelos.slice(0,5).forEach(m=>{

resultado.innerHTML+=`

<div class="result-card">

<h3>${m.nome}</h3>

<p>${marcaNome}</p>

<p>Ano aproximado: 2010 até 2024</p>

<button class="visualizar">VISUALIZAR</button>

</div>

`;

});

});

tipo.addEventListener("change",carregarMarcas);

carregarMarcas();

</script>

</body>
</html>
