<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta Veicular Offline</title>
<style>
body { font-family: Arial, sans-serif; background:#f4f4f4; margin:0; padding:0; }
header { background:#222; color:white; padding:15px; text-align:center; }
.container { max-width:900px; margin:30px auto; background:white; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1); }
select, button { width:100%; padding:10px; margin:8px 0; border-radius:5px; border:1px solid #ccc; }
button { background:#007bff; color:white; border:none; cursor:pointer; }
button:disabled { background:#999; cursor:not-allowed; }
.result { margin-top:20px; padding:15px; background:#e9ecef; border-radius:8px; white-space:pre-wrap; }
</style>
</head>
<body>
<header><h1>Consulta Veicular Offline</h1></header>

<div class="container">
<label>Marca:</label>
<select id="marca"></select>

<label>Modelo:</label>
<select id="modelo" disabled></select>

<label>Ano:</label>
<select id="ano" disabled></select>

<label>Motor:</label>
<select id="motor" disabled></select>

<button id="btnBuscar" onclick="buscarInfo()" disabled>Consultar Especificações</button>

<div class="result" id="resultado"></div>
</div>

<script>
// 🚗 Dados completos offline
const dadosVeiculos = {
    "Toyota": {
        "Corolla": [2023,2022,2021],
        "Hilux": [2023,2022],
        "Yaris": [2022,2021]
    },
    "Honda": {
        "Civic": [2023,2022,2021],
        "Fit": [2022,2021],
        "HR-V": [2023,2022]
    },
    "Ford": {
        "Ka": [2023,2022,2021],
        "EcoSport": [2022,2021],
        "Ranger": [2023,2022]
    },
    "Chevrolet": {
        "Onix": [2023,2022,2021],
        "S10": [2023,2022],
        "Tracker": [2022,2021]
    },
    "Volkswagen": {
        "Golf": [2023,2022,2021],
        "T-Cross": [2023,2022],
        "Polo": [2022,2021]
    }
};

const motoresDisponiveis = ['1.0','1.2','1.4','1.6','2.0','Turbo'];

// 🔹 Filtros e óleo padrão
const infoVeiculo = (marca, modelo, ano, motor) => ({
    motor: `${motor} 16V`,
    potencia: motor.includes('2.0') ? '150 hp' : '100 hp',
    torque: motor.includes('2.0') ? '200 Nm' : '160 Nm',
    oleo: 'API SP 5W-30',
    filtros: { oleo: 'Filtro X', ar: 'Filtro Y', combustivel: 'Filtro Z', cabine: 'Filtro C' },
    intervaloOleo: '10.000 km',
    intervaloFiltros: '15.000 km'
});

// 🔹 Funções de carregamento
function carregarMarcas() {
    const sel = document.getElementById('marca');
    if (!sel) return console.error("Select de marca não encontrado!");
    sel.innerHTML = '<option value="">Selecione uma marca...</option>';
    Object.keys(dadosVeiculos).forEach(m => sel.appendChild(new Option(m,m)));
    sel.disabled = false;
    document.getElementById('modelo').disabled = true;
    document.getElementById('ano').disabled = true;
    document.getElementById('motor').disabled = true;
    document.getElementById('btnBuscar').disabled = true;
}

function carregarModelos() {
    const marca = document.getElementById('marca').value;
    const selModelo = document.getElementById('modelo');
    const selAno = document.getElementById('ano');
    const selMotor = document.getElementById('motor');

    selModelo.innerHTML = '<option value="">Selecione o modelo...</option>';
    selAno.innerHTML = '<option value="">Selecione o ano...</option>';
    selMotor.innerHTML = '<option value="">Selecione o motor...</option>';
    document.getElementById('btnBuscar').disabled = true;

    if (!marca) { selModelo.disabled = true; selAno.disabled = true; selMotor.disabled = true; return; }

    Object.keys(dadosVeiculos[marca]).forEach(m => selModelo.appendChild(new Option(m,m)));
    selModelo.disabled = false;
    selAno.disabled = true;
    selMotor.disabled = true;
}

function carregarAnos() {
    const marca = document.getElementById('marca').value;
    const modelo = document.getElementById('modelo').value;
    const selAno = document.getElementById('ano');

    selAno.innerHTML = '<option value="">Selecione o ano...</option>';
    document.getElementById('motor').innerHTML = '<option value="">Selecione o motor...</option>';
    document.getElementById('btnBuscar').disabled = true;

    if (!modelo) { selAno.disabled = true; return; }

    dadosVeiculos[marca][modelo].forEach(a => selAno.appendChild(new Option(a,a)));
    selAno.disabled = false;
    document.getElementById('motor').disabled = true;
}

function carregarMotores() {
    const selMotor = document.getElementById('motor');
    selMotor.innerHTML = '<option value="">Selecione o motor...</option>';
    motoresDisponiveis.forEach(m => selMotor.appendChild(new Option(m,m)));
    selMotor.disabled = false;
    document.getElementById('btnBuscar').disabled = true;
}

function checarPronto() {
    document.getElementById('btnBuscar').disabled = !document.getElementById('motor').value;
}

// 🔹 Exibir resultado
function buscarInfo() {
    const marca = document.getElementById('marca').value;
    const modelo = document.getElementById('modelo').value;
    const ano = document.getElementById('ano').value;
    const motor = document.getElementById('motor').value;

    const info = infoVeiculo(marca, modelo, ano, motor);

    document.getElementById('resultado').innerText =
        `Marca: ${marca}\nModelo: ${modelo}\nAno: ${ano}\nMotor: ${info.motor}\n`+
        `Potência: ${info.potencia}\nTorque: ${info.torque}\nÓleo recomendado: ${info.oleo}\n\n`+
        `-- Filtros --\nÓleo: ${info.filtros.oleo}\nAr: ${info.filtros.ar}\nCombustível: ${info.filtros.combustivel}\nCabine: ${info.filtros.cabine}\n\n`+
        `Intervalo de troca de óleo: ${info.intervaloOleo}\nIntervalo de troca de filtros: ${info.intervaloFiltros}`;
}

// 🔹 Eventos
window.addEventListener('DOMContentLoaded', carregarMarcas);
document.getElementById('marca').addEventListener('change', carregarModelos);
document.getElementById('modelo').addEventListener('change', carregarAnos);
document.getElementById('ano').addEventListener('change', carregarMotores);
document.getElementById('motor').addEventListener('change', checarPronto);
</script>
</body>
</html>
