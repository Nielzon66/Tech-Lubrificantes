<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta Veicular</title>

<style>
body { font-family: Arial; background:#f4f4f4; }
.container { max-width:900px; margin:auto; background:#fff; padding:20px; border-radius:10px; }

input, select {
  width:100%;
  padding:12px;
  margin:10px 0;
  font-size:16px;
}

.relative { position:relative; }

.suggestions {
  position:absolute;
  background:#fff;
  border:1px solid #ccc;
  max-height:200px;
  overflow:auto;
  width:100%;
  display:none;
}

.suggestion-item {
  padding:10px;
  border-bottom:1px solid #eee;
}

.status {
  font-size:14px;
  margin-top:5px;
}

.error {
  color:red;
}
</style>
</head>

<body>

<div class="container">

<h2>Consulta Veicular</h2>

<div id="status" class="status"></div>

<select id="tipo">
  <option value="carros">Carros</option>
  <option value="motos">Motos</option>
  <option value="caminhoes">Caminhões</option>
</select>

<select id="marca"></select>

<div class="relative">
<input id="modelo" placeholder="Digite o modelo..." disabled>
<div id="sugestoes" class="suggestions"></div>
</div>

<select id="ano" disabled></select>

</div>

<script>
const tipo = document.getElementById('tipo');
const marca = document.getElementById('marca');
const modelo = document.getElementById('modelo');
const sugestoes = document.getElementById('sugestoes');
const ano = document.getElementById('ano');
const status = document.getElementById('status');

let modelos = [];

function setStatus(msg, erro=false){
  status.innerText = msg;
  status.className = erro ? 'status error' : 'status';
}

// 🔥 FETCH COM FALLBACK
async function fetchComBackup(url1, url2){
  try{
    const r1 = await fetch(url1);
    if(!r1.ok) throw "Erro 1";
    return await r1.json();
  }catch{
    try{
      const r2 = await fetch(url2);
      if(!r2.ok) throw "Erro 2";
      return await r2.json();
    }catch{
      throw "Falha total";
    }
  }
}

// 🔥 MARCAS
async function carregarMarcas(){
  setStatus("Carregando marcas...");

  try{
    const data = await fetchComBackup(
      `https://parallelum.com.br/fipe/api/v1/${tipo.value}/marcas`,
      `https://brasilapi.com.br/api/fipe/marcas/v1/${tipo.value}`
    );

    marca.innerHTML = '<option value="">Selecione a marca</option>';

    data.forEach(m=>{
      marca.add(new Option(m.nome, m.codigo));
    });

    setStatus("Marcas carregadas");

  }catch{
    setStatus("Erro ao carregar marcas", true);
  }
}

// 🔥 MODELOS
marca.addEventListener('change', async ()=>{
  modelo.value='';
  modelo.disabled=true;
  ano.innerHTML='';
  ano.disabled=true;

  if(!marca.value) return;

  setStatus("Carregando modelos...");

  try{
    const data = await fetchComBackup(
      `https://parallelum.com.br/fipe/api/v1/${tipo.value}/marcas/${marca.value}/modelos`,
      `https://brasilapi.com.br/api/fipe/veiculos/v1/${tipo.value}/${marca.value}`
    );

    modelos = data.modelos || data;

    modelo.disabled=false;

    setStatus("Digite o modelo");

  }catch{
    setStatus("Erro ao carregar modelos (API bloqueada)", true);
  }
});

// 🔥 AUTOCOMPLETE
modelo.addEventListener('input', ()=>{
  const termo = modelo.value.toLowerCase();

  const lista = modelos.filter(m =>
    m.nome.toLowerCase().includes(termo)
  );

  sugestoes.innerHTML='';

  lista.slice(0,15).forEach(m=>{
    const div=document.createElement('div');
    div.className='suggestion-item';
    div.textContent=m.nome;

    div.onclick=async ()=>{
      modelo.value=m.nome;
      sugestoes.style.display='none';

      setStatus("Carregando anos...");

      try{
        const anos = await fetchComBackup(
          `https://parallelum.com.br/fipe/api/v1/${tipo.value}/marcas/${marca.value}/modelos/${m.codigo}/anos`,
          `https://brasilapi.com.br/api/fipe/veiculo/v1/${tipo.value}/${marca.value}/${m.codigo}`
        );

        ano.innerHTML='';

        (anos.anos || anos).forEach(a=>{
          ano.add(new Option(a.nome, a.codigo));
        });

        ano.disabled=false;

        setStatus("Anos carregados");

      }catch{
        setStatus("Erro ao carregar anos", true);
      }
    };

    sugestoes.appendChild(div);
  });

  sugestoes.style.display = lista.length ? 'block' : 'none';
});

tipo.addEventListener('change', carregarMarcas);

carregarMarcas();
</script>

</body>
</html>
