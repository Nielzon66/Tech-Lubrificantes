<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta Veicular</title>

<style>

body{
margin:0;
font-family:Arial;
background:#000;
color:white;
}

/* TOPO */

.topo{
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
background:#111;
}

/* CAIXA */

.box{
background:#2c2c2c;
margin:15px;
padding:15px;
border-radius:20px;
}

/* INPUT */

input,select{
width:100%;
padding:14px;
margin:6px 0;
border:none;
border-radius:10px;
background:#3a3a3a;
color:white;
font-size:15px;
}

/* BOTÃO */

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#16a36d;
color:white;
font-size:16px;
font-weight:bold;
}

/* LISTA DE MARCAS */

.marca-lista{
margin:15px;
}

.marca-item{
display:flex;
align-items:center;
gap:10px;
background:#1c1c1c;
padding:12px;
border-radius:12px;
margin-bottom:8px;
cursor:pointer;
}

.marca-item img{
width:35px;
height:35px;
object-fit:contain;
}

/* RESULTADOS */

.resultado{
margin:15px;
}

.card{

background:#f2f2f2;
color:#000;

border-radius:20px;

padding:20px;

margin-bottom:15px;

}

.card h3{
margin-top:0;
}

.visualizar{

background:#16a36d;

color:white;

border:none;

padding:12px;

width:100%;

border-radius:10px;

margin-top:10px;

font-weight:bold;

}

</style>
</head>

<body>

<div class="topo">
AUTO ÓLEO - BUSQUE SEU VEÍCULO
</div>

<div class="box">

<select id="marca"></select>

<input id="modelo" placeholder="Ex: Onix 1.0">

<button onclick="buscar()">Pesquisar</button>

</div>

<div class="resultado" id="resultado"></div>

<script>

const marcaSelect=document.getElementById("marca");
const resultado=document.getElementById("resultado");

let modelos=[];

/* MARCAS PERMITIDAS */

const marcasPermitidas=[
"Chevrolet",
"Volkswagen",
"Fiat",
"Toyota",
"Honda",
"Hyundai",
"Renault",
"Nissan",
"Jeep",
"Peugeot",
"Citroen",
"Ford",
"Mitsubishi",
"Kia",
"Chery",
"Ram",
"Suzuki"
];

/* LOGOS */

const logos={
"Chevrolet":"https://logo.clearbit.com/chevrolet.com",
"Volkswagen":"https://logo.clearbit.com/vw.com",
"Fiat":"https://logo.clearbit.com/fiat.com",
"Toyota":"https://logo.clearbit.com/toyota.com",
"Honda":"https://logo.clearbit.com/honda.com",
"Hyundai":"https://logo.clearbit.com/hyundai.com",
"Renault":"https://logo.clearbit.com/renault.com",
"Nissan":"https://logo.clearbit.com/nissan.com",
"Jeep":"https://logo.clearbit.com/jeep.com",
"Peugeot":"https://logo.clearbit.com/peugeot.com",
"Citroen":"https://logo.clearbit.com/citroen.com",
"Ford":"https://logo.clearbit.com/ford.com",
"Mitsubishi":"https://logo.clearbit.com/mitsubishi-motors.com",
"Kia":"https://logo.clearbit.com/kia.com",
"Chery":"https://logo.clearbit.com/cheryinternational.com",
"Ram":"https://logo.clearbit.com/ramtrucks.com",
"Suzuki":"https://logo.clearbit.com/suzuki.com"
};

/* CARREGAR MARCAS */

async function carregarMarcas(){

const r=await fetch("https://parallelum.com.br/fipe/api/v1/carros/marcas");

const data=await r.json();

marcaSelect.innerHTML="<option>Selecione a marca</option>";

data
.filter(m =>
marcasPermitidas.some(p =>
m.nome.toLowerCase().includes(p.toLowerCase())
))
.forEach(m=>{

marcaSelect.innerHTML+=`
<option value="${m.codigo}">
${m.nome}
</option>
`;

});

}

/* BUSCAR MODELOS */

marcaSelect.addEventListener("change",async()=>{

const r=await fetch(`https://parallelum.com.br/fipe/api/v1/carros/marcas/${marcaSelect.value}/modelos`);

const data=await r.json();

modelos=data.modelos;

});

/* PESQUISAR */

function buscar(){

resultado.innerHTML="";

const marcaNome=marcaSelect.options[marcaSelect.selectedIndex].text;

const logo=Object.keys(logos).find(m=>marcaNome.includes(m));

const logoUrl=logos[logo];

modelos.slice(0,6).forEach(m=>{

resultado.innerHTML+=`

<div class="card">

<h3>${m.nome}</h3>

<p>${marcaNome}</p>

<p>Ano aproximado: 2010 até 2024</p>

<button class="visualizar">
VISUALIZAR
</button>

</div>

`;

});

}

carregarMarcas();

</script>

</body>
</html>
