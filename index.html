<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Consulta Veicular</title>

<style>

body{
margin:0;
font-family:Arial;
background:#050505;
color:white;
}

/* TOPO */

header{
background:#0f0f0f;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
border-bottom:1px solid #222;
}

/* CARD DE BUSCA */

.search-box{

margin:20px;

background:#1c1c1c;

padding:20px;

border-radius:20px;

}

select,input{

width:100%;

padding:14px;

border:none;

border-radius:12px;

margin-top:10px;

background:#2c2c2c;

color:white;

font-size:15px;

}

button{

width:100%;

margin-top:12px;

padding:14px;

border:none;

border-radius:12px;

background:linear-gradient(90deg,#00a870,#15d69c);

color:white;

font-size:16px;

font-weight:bold;

cursor:pointer;

}

/* RESULTADOS */

.results{

padding:15px;

}

.vehicle-card{

background:white;

color:black;

border-radius:20px;

padding:20px;

margin-bottom:15px;

}

.vehicle-header{

display:flex;

align-items:center;

gap:10px;

margin-bottom:10px;

}

.vehicle-header img{

width:40px;

height:40px;

object-fit:contain;

}

.vehicle-card h3{

margin:5px 0;

}

.visualizar{

background:linear-gradient(90deg,#00a870,#15d69c);

border:none;

padding:12px;

width:100%;

border-radius:10px;

color:white;

font-weight:bold;

margin-top:10px;

cursor:pointer;

}

/* DETALHES */

.details{

margin-top:10px;

font-size:14px;

line-height:22px;

}

</style>
</head>

<body>

<header>
AUTO CONSULTA VEICULAR
</header>

<div class="search-box">

<select id="marca"></select>

<input id="modelo" placeholder="Ex: Onix">

<button onclick="buscar()">Buscar veículo</button>

</div>

<div class="results" id="resultado"></div>

<script>

const marcaSelect=document.getElementById("marca");
const modeloInput=document.getElementById("modelo");
const resultado=document.getElementById("resultado");

let modelos=[];

/* MARCAS BRASIL */

const marcasPermitidas=[
"Chevrolet",
"Volkswagen",
"Fiat",
"Toyota",
"Honda",
"Hyundai",
"Renault",
"Nissan",
"Jeep",
"Peugeot",
"Citroen",
"Ford",
"Mitsubishi",
"Kia",
"Chery",
"Ram",
"Suzuki"
];

/* LOGOS */

const logos={
"Chevrolet":"https://upload.wikimedia.org/wikipedia/commons/4/4e/Chevrolet_logo.png",
"Volkswagen":"https://upload.wikimedia.org/wikipedia/commons/6/6d/Volkswagen_logo_2019.png",
"Fiat":"https://upload.wikimedia.org/wikipedia/commons/8/8d/Fiat_logo.svg",
"Toyota":"https://upload.wikimedia.org/wikipedia/commons/9/9d/Toyota_carlogo.png",
"Honda":"https://upload.wikimedia.org/wikipedia/commons/7/7b/Honda_logo.svg",
"Hyundai":"https://upload.wikimedia.org/wikipedia/commons/4/44/Hyundai_Motor_Company_logo.svg",
"Renault":"https://upload.wikimedia.org/wikipedia/commons/b/b7/Renault_2021_Text.svg",
"Nissan":"https://upload.wikimedia.org/wikipedia/commons/8/8c/Nissan_logo.png",
"Jeep":"https://upload.wikimedia.org/wikipedia/commons/9/9b/Jeep_logo.svg",
"Peugeot":"https://upload.wikimedia.org/wikipedia/commons/7/75/Peugeot_Logo.svg",
"Citroen":"https://upload.wikimedia.org/wikipedia/commons/7/7b/Citro%C3%ABn_logo.svg",
"Ford":"https://upload.wikimedia.org/wikipedia/commons/3/3e/Ford_logo_flat.svg",
"Mitsubishi":"https://upload.wikimedia.org/wikipedia/commons/5/5a/Mitsubishi_logo.svg",
"Kia":"https://upload.wikimedia.org/wikipedia/commons/4/4d/Kia_logo3.svg",
"Chery":"https://upload.wikimedia.org/wikipedia/commons/2/2e/Chery_logo.svg",
"Ram":"https://upload.wikimedia.org/wikipedia/commons/7/7d/Ram_Trucks_logo.svg",
"Suzuki":"https://upload.wikimedia.org/wikipedia/commons/1/12/Suzuki_logo_2.svg"
};

/* CARREGAR MARCAS */

async function carregarMarcas(){

const r=await fetch("https://parallelum.com.br/fipe/api/v1/carros/marcas");

const data=await r.json();

marcaSelect.innerHTML="<option>Selecione a montadora</option>";

data
.filter(m =>
marcasPermitidas.some(p =>
m.nome.toLowerCase().includes(p.toLowerCase())
))
.forEach(m=>{

marcaSelect.innerHTML+=`
<option value="${m.codigo}">
${m.nome}
</option>
`;

});

}

/* CARREGAR MODELOS */

marcaSelect.addEventListener("change",async()=>{

const r=await fetch(`https://parallelum.com.br/fipe/api/v1/carros/marcas/${marcaSelect.value}/modelos`);

const data=await r.json();

modelos=data.modelos;

});

/* BUSCA */

function buscar(){

resultado.innerHTML="";

const termo=modeloInput.value.toLowerCase();

const marcaNome=marcaSelect.options[marcaSelect.selectedIndex].text;

const lista=modelos.filter(m=>m.nome.toLowerCase().includes(termo));

const logo=Object.keys(logos).find(m=>marcaNome.includes(m));

const logoUrl=logos[logo];

lista.slice(0,6).forEach(m=>{

resultado.innerHTML+=`

<div class="vehicle-card">

<div class="vehicle-header">

<img src="${logoUrl}">

<b>${marcaNome}</b>

</div>

<h3>${m.nome}</h3>

<div class="details">

Motor: consultar manual do fabricante<br>
Troca de óleo média: 10.000 km<br>
Filtro de óleo: consultar aplicação

</div>

<button class="visualizar" onclick="alert('Abrir ficha completa do veículo')">

VISUALIZAR

</button>

</div>

`;

});

}

carregarMarcas();

</script>

</body>
</html>
