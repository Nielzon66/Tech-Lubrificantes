<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta Veicular PRO</title>

<style>
body { font-family: Arial; background:#0f172a; color:#fff; margin:0; }
.container { max-width:900px; margin:auto; padding:15px; }

.card {
  background:#1e293b;
  padding:15px;
  border-radius:12px;
}

input, select, button {
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}

button { background:#2563eb; color:#fff; }

.result-card {
  margin-top:15px;
  background:#1e293b;
  border-radius:12px;
  overflow:hidden;
}

.result-card img {
  width:100%;
  height:200px;
  object-fit:cover;
}

.result-content { padding:15px; }
</style>
</head>

<body>

<div class="container">

<h2>🚗 Consulta Veicular PRO</h2>

<div class="card">

<select id="tipo">
<option value="carros">Carros</option>
<option value="motos">Motos</option>
<option value="caminhoes">Caminhões</option>
</select>

<select id="marca"></select>

<input id="modelo" placeholder="Digite o modelo..." disabled>

<select id="motor">
<option value="">Motor</option>
<option value="1.0">1.0</option>
<option value="1.4">1.4</option>
<option value="1.6">1.6</option>
<option value="2.0">2.0</option>
<option value="diesel">Diesel</option>
</select>

<select id="marcaFiltro">
<option value="wega">Wega</option>
<option value="tecfil">Tecfil</option>
<option value="fram">Fram</option>
</select>

<button id="btnBuscar">Consultar</button>

</div>

<div id="resultado"></div>

</div>

<script>
const tipo = document.getElementById('tipo');
const marca = document.getElementById('marca');
const modelo = document.getElementById('modelo');
const resultado = document.getElementById('resultado');
const motorEl = document.getElementById('motor');
const marcaFiltro = document.getElementById('marcaFiltro');

let modelos = [];
let banco = {};

// 🔥 CARREGAR BANCO JSON
fetch("filtros.json")
.then(r=>r.json())
.then(data=> banco = data);

// 🔥 FETCH COM BACKUP
async function fetchComBackup(url1, url2){
  try{
    const r1 = await fetch(url1);
    if(!r1.ok) throw "";
    return await r1.json();
  }catch{
    const r2 = await fetch(url2);
    return await r2.json();
  }
}

// 🔥 CARREGAR MARCAS
async function carregarMarcas(){
  const data = await fetchComBackup(
    `https://parallelum.com.br/fipe/api/v1/${tipo.value}/marcas`,
    `https://brasilapi.com.br/api/fipe/marcas/v1/${tipo.value}`
  );

  marca.innerHTML = '<option value="">Selecione a marca</option>';
  data.forEach(m=>marca.add(new Option(m.nome, m.codigo)));
}

// 🔥 CARREGAR MODELOS
marca.addEventListener('change', async ()=>{
  const data = await fetchComBackup(
    `https://parallelum.com.br/fipe/api/v1/${tipo.value}/marcas/${marca.value}/modelos`,
    `https://brasilapi.com.br/api/fipe/veiculos/v1/${tipo.value}/${marca.value}`
  );

  modelos = data.modelos || data;
  modelo.disabled=false;
});

// 🔥 BUSCA INTELIGENTE
function buscarFiltro(modeloNome, motor, filtro){
  const busca = modeloNome.toLowerCase();

  for(const chave in banco){
    const nomeBase = chave.split(" ")[0];

    if(busca.includes(nomeBase) && chave.includes(motor)){
      return banco[chave]?.[filtro];
    }
  }

  return null;
}

// 🔥 CONSULTA FINAL
document.getElementById('btnBuscar').onclick = ()=>{

  const modeloNome = modelo.value;
  const motor = motorEl.value;
  const filtro = marcaFiltro.value;

  if(!modeloNome || !motor){
    alert("Preencha tudo");
    return;
  }

  const dados = buscarFiltro(modeloNome, motor, filtro);

  if(!dados){
    alert("Filtro não encontrado no banco");
    return;
  }

  const imagem = `https://tse1.mm.bing.net/th?q=${modeloNome}+carro`;

  resultado.innerHTML = `
    <div class="result-card">
      <img src="${imagem}">
      <div class="result-content">
        <p><b>${modeloNome}</b></p>
        <p>Óleo: ${dados.oleo}</p>
        <p>Ar: ${dados.ar}</p>
        <p>Combustível: ${dados.combustivel}</p>
        <p>Cabine: ${dados.cabine}</p>
      </div>
    </div>
  `;
};

tipo.addEventListener('change', carregarMarcas);
carregarMarcas();
</script>

</body>
</html>
