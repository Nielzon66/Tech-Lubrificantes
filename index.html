<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta Veicular</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:#fff;
margin:0;
}

.container{
max-width:900px;
margin:auto;
padding:15px;
}

h2{text-align:center;}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-bottom:10px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:none;
background:#0f172a;
color:#fff;
}

.marca-lista{
max-height:200px;
overflow:auto;
}

.marca-item{
display:flex;
align-items:center;
gap:10px;
padding:10px;
border-bottom:1px solid #334155;
cursor:pointer;
}

.marca-item img{width:30px;}

.marca-item:hover{background:#2563eb;}

.veiculo-card{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-top:8px;
cursor:pointer;
}

.veiculo-card:hover{
background:#2563eb;
}

.result-card{
margin-top:15px;
background:#1e293b;
border-radius:12px;
overflow:hidden;
}

.result-card img{
width:100%;
height:220px;
object-fit:cover;
}

.result-content{
padding:15px;
}

button{
margin-top:10px;
padding:12px;
width:100%;
border:none;
border-radius:8px;
background:#2563eb;
color:#fff;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h2>Consulta Veicular</h2>

<div class="card">

<input id="buscaMarca" placeholder="Digite a marca">

<div id="listaMarcas" class="marca-lista"></div>

<input id="buscaModelo" placeholder="Digite o modelo" disabled>

<select id="ano" disabled></select>

<div id="veiculos"></div>

</div>

<div id="paginaVeiculo"></div>

</div>

<script>

const marcasPermitidas=[
"Chevrolet",
"Volkswagen",
"Fiat",
"Toyota",
"Honda",
"Hyundai",
"Renault",
"Nissan",
"Jeep",
"Peugeot",
"Citroen",
"Ford",
"Mitsubishi",
"Kia",
"Chery",
"Suzuki",
"Ram"
]

const oleos={
"onix":{oleo:"5W30",litros:"3.5L"},
"gol":{oleo:"5W40",litros:"3.5L"},
"hb20":{oleo:"5W30",litros:"3.6L"},
"corolla":{oleo:"0W20",litros:"4.2L"},
"civic":{oleo:"0W20",litros:"3.7L"},
"uno":{oleo:"15W40",litros:"3.2L"},
"palio":{oleo:"15W40",litros:"3.2L"},
"ka":{oleo:"5W20",litros:"4L"}
}

let marcas=[]
let modelos=[]
let marcaSelecionada
let modeloSelecionado

async function carregarMarcas(){

const r=await fetch("https://parallelum.com.br/fipe/api/v1/carros/marcas")
let data=await r.json()

marcas=data.filter(m=>
marcasPermitidas.some(p=>
m.nome.toLowerCase().includes(p.toLowerCase())
))

mostrarMarcas(marcas)

}

function mostrarMarcas(lista){

listaMarcas.innerHTML=""

lista.forEach(m=>{

const logo=`https://tse2.mm.bing.net/th?q=${m.nome}+logo`

const div=document.createElement("div")
div.className="marca-item"

div.innerHTML=`
<img src="${logo}">
<span>${m.nome}</span>
`

div.onclick=()=>selecionarMarca(m)

listaMarcas.appendChild(div)

})

}

buscaMarca.oninput=()=>{

const termo=buscaMarca.value.toLowerCase()

const filtrado=marcas.filter(m=>
m.nome.toLowerCase().includes(termo)
)

mostrarMarcas(filtrado)

}

async function selecionarMarca(m){

marcaSelecionada=m
buscaMarca.value=m.nome
listaMarcas.innerHTML=""

buscaModelo.disabled=false

const r=await fetch(`https://parallelum.com.br/fipe/api/v1/carros/marcas/${m.codigo}/modelos`)
const data=await r.json()

modelos=data.modelos

}

buscaModelo.oninput=()=>{

const termo=buscaModelo.value.toLowerCase()

const lista=modelos.filter(m=>
m.nome.toLowerCase().includes(termo)
)

veiculos.innerHTML=""

lista.slice(0,10).forEach(m=>{

const div=document.createElement("div")
div.className="veiculo-card"
div.innerHTML=`🚗 ${m.nome}`

div.onclick=()=>selecionarModelo(m)

veiculos.appendChild(div)

})

}

async function selecionarModelo(m){

modeloSelecionado=m

const r=await fetch(`https://parallelum.com.br/fipe/api/v1/carros/marcas/${marcaSelecionada.codigo}/modelos/${m.codigo}/anos`)
const anos=await r.json()

ano.innerHTML=""

anos.forEach(a=>{

const op=document.createElement("option")
op.value=a.codigo
op.text=a.nome

ano.appendChild(op)

})

ano.disabled=false

}

ano.onchange=async()=>{

const r=await fetch(`https://parallelum.com.br/fipe/api/v1/carros/marcas/${marcaSelecionada.codigo}/modelos/${modeloSelecionado.codigo}/anos/${ano.value}`)
const info=await r.json()

abrirVeiculo(info)

}

function abrirVeiculo(info){

let chave=modeloSelecionado.nome.toLowerCase()

let dados=oleos[chave] || {oleo:"Consultar manual",litros:"-"}

const imagem=`https://tse1.mm.bing.net/th?q=${marcaSelecionada.nome}+${modeloSelecionado.nome}+carro`

paginaVeiculo.innerHTML=`

<div class="result-card">

<img src="${imagem}">

<div class="result-content">

<h3>${marcaSelecionada.nome} ${modeloSelecionado.nome}</h3>

<p>Ano: ${info.AnoModelo}</p>
<p>Combustível: ${info.Combustivel}</p>

<hr>

<p><b>Óleo recomendado</b></p>
<p>Tipo: ${dados.oleo}</p>
<p>Quantidade: ${dados.litros}</p>

<button onclick="voltar()">Voltar</button>

</div>

</div>

`

}

function voltar(){

paginaVeiculo.innerHTML=""

}

carregarMarcas()

</script>

</body>
</html>
