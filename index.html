<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Consulta Veicular PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b0e17;
  --surface: #131a27;
  --surface2: #1a2235;
  --border: #1f2e45;
  --accent: #3b82f6;
  --accent2: #2563eb;
  --green: #22c97a;
  --amber: #f59e0b;
  --text: #e8f0fe;
  --muted: #6b84a3;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.container {
  max-width: 600px;
  margin: 0 auto;
  padding: 16px;
  padding-bottom: 40px;
}

/* HEADER */
.header {
  text-align: center;
  padding: 24px 0 20px;
}
.header-icon {
  width: 56px; height: 56px;
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  border-radius: 16px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 10px;
  box-shadow: 0 8px 24px rgba(59,130,246,0.35);
}
.header h1 {
  font-family: 'Rajdhani', sans-serif;
  font-size: 26px;
  font-weight: 700;
  letter-spacing: 0.5px;
}
.header h1 span { color: var(--accent); }
.header p { color: var(--muted); font-size: 13px; margin-top: 4px; }

/* CARD */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px;
  margin-bottom: 14px;
}
.card-title {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 14px;
}

/* FORM */
.form-group { margin-bottom: 12px; }
.form-label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 6px;
}
select, input {
  width: 100%;
  padding: 12px 14px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: 14px;
  font-family: 'Nunito', sans-serif;
  font-weight: 600;
  appearance: none;
  -webkit-appearance: none;
  outline: none;
  transition: border-color .2s;
}
select:focus, input:focus { border-color: var(--accent); }
select:disabled, input:disabled { opacity: 0.4; }

.select-wrap { position: relative; }
.select-wrap::after {
  content: '▾';
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--accent);
  pointer-events: none;
}

/* AUTOCOMPLETE */
.relative { position: relative; }
.suggestions {
  position: absolute;
  top: calc(100% + 4px);
  left: 0; right: 0;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  max-height: 220px;
  overflow-y: auto;
  z-index: 999;
  display: none;
  box-shadow: 0 8px 24px rgba(0,0,0,.5);
}
.suggestion-item {
  padding: 11px 14px;
  font-size: 14px;
  font-weight: 600;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .15s;
}
.suggestion-item:last-child { border-bottom: none; }
.suggestion-item:hover, .suggestion-item:active { background: rgba(59,130,246,.15); color: var(--accent); }

/* CHIPS TIPO */
.tipo-chips { display: flex; gap: 8px; margin-bottom: 16px; }
.tipo-chip {
  flex: 1;
  padding: 9px 6px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--surface2);
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
  text-align: center;
  cursor: pointer;
  transition: all .2s;
}
.tipo-chip.active {
  background: rgba(59,130,246,.15);
  border-color: var(--accent);
  color: var(--accent);
}

/* BUTTON */
.btn {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  color: #fff;
  font-size: 15px;
  font-weight: 800;
  font-family: 'Nunito', sans-serif;
  cursor: pointer;
  letter-spacing: 0.3px;
  transition: all .2s;
  box-shadow: 0 4px 16px rgba(59,130,246,.3);
}
.btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(59,130,246,.4); }
.btn:active { transform: scale(.97); }
.btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

/* STATUS */
.status {
  text-align: center;
  font-size: 13px;
  color: var(--muted);
  padding: 8px 0;
  min-height: 28px;
}
.status.error { color: #f87171; }

/* LOADING */
.spinner {
  width: 28px; height: 28px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  margin: 16px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* RESULT */
.result-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  animation: fadeIn .4s ease;
  margin-top: 16px;
}
@keyframes fadeIn {
  from { opacity:0; transform:translateY(10px); }
  to { opacity:1; transform:translateY(0); }
}

.result-header {
  background: linear-gradient(135deg, #0d1f3c, #0a1628);
  padding: 18px;
  border-bottom: 1px solid var(--border);
}
.result-header h3 {
  font-family: 'Rajdhani', sans-serif;
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 4px;
}
.result-header p { font-size: 13px; color: var(--muted); }

.spec-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--border);
}
.spec-item {
  background: var(--surface);
  padding: 14px 16px;
}
.spec-item.full { grid-column: 1 / -1; }
.spec-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 4px;
}
.spec-value {
  font-family: 'Rajdhani', sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--accent);
}
.spec-value.green { color: var(--green); }
.spec-value.amber { color: var(--amber); }
.spec-value.sm { font-size: 15px; }

.filtros-section { padding: 16px; }
.filtros-title {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--muted);
  margin-bottom: 12px;
}
.filtro-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}
.filtro-row:last-child { border-bottom: none; }
.filtro-row span:first-child { color: var(--muted); }
.filtro-row span:last-child { font-weight: 700; font-family: 'Rajdhani', sans-serif; font-size: 16px; }

.badges { padding: 0 16px 16px; display: flex; gap: 8px; flex-wrap: wrap; }
.badge {
  background: rgba(59,130,246,.15);
  border: 1px solid rgba(59,130,246,.3);
  color: var(--accent);
  padding: 5px 11px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
}
.badge.green {
  background: rgba(34,201,122,.1);
  border-color: rgba(34,201,122,.3);
  color: var(--green);
}
.badge.amber {
  background: rgba(245,158,11,.1);
  border-color: rgba(245,158,11,.3);
  color: var(--amber);
}

.obs-box {
  margin: 0 16px 16px;
  background: rgba(245,158,11,.08);
  border: 1px solid rgba(245,158,11,.25);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 12.5px;
  color: #c8a45a;
  line-height: 1.5;
}
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="header-icon">🔧</div>
    <h1>Consulta <span>Veicular</span> PRO</h1>
    <p>Dados reais da tabela FIPE · Mercado brasileiro</p>
  </div>

  <div class="card">
    <div class="card-title">Tipo de veículo</div>
    <div class="tipo-chips">
      <div class="tipo-chip active" onclick="setTipo(this,'carros')">🚗 Carros</div>
      <div class="tipo-chip" onclick="setTipo(this,'motos')">🏍️ Motos</div>
      <div class="tipo-chip" onclick="setTipo(this,'caminhoes')">🚛 Caminhões</div>
    </div>

    <div class="form-group">
      <label class="form-label">Marca</label>
      <div class="select-wrap">
        <select id="marca"></select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Modelo</label>
      <div class="relative">
        <input id="modelo" placeholder="Digite para pesquisar..." disabled autocomplete="off">
        <div id="sugestoes" class="suggestions"></div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Ano</label>
      <div class="select-wrap">
        <select id="ano" disabled><option value="">Selecione o ano</option></select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Motor / Versão</label>
      <div class="select-wrap">
        <select id="motor">
          <option value="">Selecione o motor</option>
          <option value="1.0">1.0 (aspirado)</option>
          <option value="1.0t">1.0 Turbo</option>
          <option value="1.2t">1.2 Turbo</option>
          <option value="1.3t">1.3 Turbo</option>
          <option value="1.4">1.4</option>
          <option value="1.4t">1.4 Turbo</option>
          <option value="1.5t">1.5 Turbo</option>
          <option value="1.6">1.6</option>
          <option value="1.8">1.8</option>
          <option value="2.0">2.0</option>
          <option value="2.0t">2.0 Turbo</option>
          <option value="2.4">2.4</option>
          <option value="diesel2.0">2.0 Diesel</option>
          <option value="diesel2.2">2.2 Diesel</option>
          <option value="diesel2.5">2.5 Diesel</option>
          <option value="diesel2.8">2.8 Diesel</option>
          <option value="diesel3.0">3.0 Diesel</option>
          <option value="diesel4.5">4.5 Diesel</option>
          <option value="hibrido1.8">1.8 Híbrido</option>
          <option value="eletrico">Elétrico</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Marca do filtro</label>
      <div class="select-wrap">
        <select id="marcaFiltro">
          <option value="wega">Wega</option>
          <option value="tecfil">Tecfil</option>
          <option value="fram">Fram</option>
          <option value="mann">Mann-Filter</option>
        </select>
      </div>
    </div>

    <div id="status" class="status"></div>
    <button class="btn" id="btnBuscar" onclick="consultar()">🔍 Consultar Lubrificante</button>
  </div>

  <div id="resultado"></div>

</div>

<script>
// ── ESTADO ────────────────────────────────────────────────
let tipoAtual = 'carros';
let modeloSelecionado = null;
let listaModelos = [];

const els = {
  marca: document.getElementById('marca'),
  modelo: document.getElementById('modelo'),
  sugestoes: document.getElementById('sugestoes'),
  ano: document.getElementById('ano'),
  motor: document.getElementById('motor'),
  marcaFiltro: document.getElementById('marcaFiltro'),
  status: document.getElementById('status'),
  resultado: document.getElementById('resultado'),
};

// ── STATUS ────────────────────────────────────────────────
function setStatus(msg, erro = false) {
  els.status.textContent = msg;
  els.status.className = 'status' + (erro ? ' error' : '');
}

// ── TIPO ──────────────────────────────────────────────────
function setTipo(el, tipo) {
  document.querySelectorAll('.tipo-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  tipoAtual = tipo;
  resetForm();
  carregarMarcas();
}

function resetForm() {
  els.modelo.value = '';
  els.modelo.disabled = true;
  els.sugestoes.style.display = 'none';
  els.ano.innerHTML = '<option value="">Selecione o ano</option>';
  els.ano.disabled = true;
  modeloSelecionado = null;
  listaModelos = [];
  els.resultado.innerHTML = '';
}

// ── FIPE API ──────────────────────────────────────────────
async function fipeGet(path) {
  const base = 'https://parallelum.com.br/fipe/api/v1';
  const r = await fetch(base + path);
  if (!r.ok) throw new Error('FIPE ' + r.status);
  return r.json();
}

async function carregarMarcas() {
  setStatus('Carregando marcas...');
  els.marca.innerHTML = '<option value="">Carregando...</option>';
  try {
    const data = await fipeGet(`/${tipoAtual}/marcas`);
    els.marca.innerHTML = '<option value="">Selecione a marca</option>';
    data.forEach(m => els.marca.add(new Option(m.nome, m.codigo)));
    setStatus('');
  } catch {
    setStatus('Erro ao carregar marcas. Verifique a conexão.', true);
  }
}

els.marca.addEventListener('change', async () => {
  resetForm();
  if (!els.marca.value) return;
  setStatus('Carregando modelos...');
  try {
    const data = await fipeGet(`/${tipoAtual}/marcas/${els.marca.value}/modelos`);
    listaModelos = data.modelos || data;
    els.modelo.disabled = false;
    els.modelo.placeholder = 'Digite para pesquisar...';
    setStatus('');
  } catch {
    setStatus('Erro ao carregar modelos.', true);
  }
});

els.modelo.addEventListener('input', () => {
  const termo = els.modelo.value.toLowerCase().trim();
  els.sugestoes.innerHTML = '';
  if (!termo) { els.sugestoes.style.display = 'none'; return; }
  const lista = listaModelos.filter(m => m.nome.toLowerCase().includes(termo));
  if (!lista.length) { els.sugestoes.style.display = 'none'; return; }
  lista.slice(0, 12).forEach(m => {
    const div = document.createElement('div');
    div.className = 'suggestion-item';
    div.textContent = m.nome;
    div.addEventListener('mousedown', async (e) => {
      e.preventDefault();
      els.modelo.value = m.nome;
      modeloSelecionado = m;
      els.sugestoes.style.display = 'none';
      await carregarAnos(m.codigo);
    });
    els.sugestoes.appendChild(div);
  });
  els.sugestoes.style.display = 'block';
});

document.addEventListener('click', (e) => {
  if (!e.target.closest('.relative')) els.sugestoes.style.display = 'none';
});

async function carregarAnos(codigoModelo) {
  setStatus('Carregando anos...');
  els.ano.innerHTML = '<option value="">Carregando...</option>';
  els.ano.disabled = true;
  try {
    const data = await fipeGet(`/${tipoAtual}/marcas/${els.marca.value}/modelos/${codigoModelo}/anos`);
    els.ano.innerHTML = '<option value="">Selecione o ano</option>';
    (data.anos || data).forEach(a => els.ano.add(new Option(a.nome, a.codigo)));
    els.ano.disabled = false;
    setStatus('');
  } catch {
    setStatus('Erro ao carregar anos.', true);
  }
}

// ── LOOKUP ÓLEO ───────────────────────────────────────────
function buscarOleo(nomeModelo, motor) {
  const m = nomeModelo.toLowerCase();
  // encontra chave no db que aparece no nome do modelo
  const chave = Object.keys(OLEO_DB).find(k => m.includes(k));
  if (!chave) return null;
  const db = OLEO_DB[chave];
  // tenta motor exato, depois por prefixo
  return db[motor] || db[motor.replace('t','')] || Object.values(db)[0] || null;
}

function buscarFiltros(nomeModelo) {
  const m = nomeModelo.toLowerCase();
  const chave = Object.keys(FILTROS_DB).find(k => m.includes(k));
  if (!chave) return null;
  return FILTROS_DB[chave];
}
