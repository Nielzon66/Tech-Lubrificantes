<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta Veicular Online</title>

<style>
body { font-family: Arial; background:#f4f4f4; }
.container { max-width:900px; margin:auto; background:#fff; padding:20px; border-radius:10px; }
input, select { width:100%; padding:10px; margin:8px 0; }
.relative { position:relative; }
.suggestions {
  position:absolute; background:#fff; border:1px solid #ccc;
  max-height:250px; overflow:auto; width:100%; display:none;
}
.suggestion-item { padding:6px; cursor:pointer; }
.suggestion-item:hover { background:#007bff; color:#fff; }
</style>
</head>

<body>

<div class="container">

<h2>Consulta Veicular (Online)</h2>

<label>Tipo</label>
<select id="tipo">
  <option value="carros">Carros</option>
  <option value="motos">Motos</option>
  <option value="caminhoes">Caminhões</option>
</select>

<label>Marca</label>
<select id="marca"></select>

<label>Modelo</label>
<div class="relative">
<input id="modelo" placeholder="Digite o modelo..." disabled>
<div id="sugestoes" class="suggestions"></div>
</div>

<label>Ano</label>
<select id="ano" disabled></select>

</div>

<script>

// 🔥 PEGAR ELEMENTOS CORRETAMENTE
const tipoEl = document.getElementById('tipo');
const marcaEl = document.getElementById('marca');
const modeloEl = document.getElementById('modelo');
const sugestoesEl = document.getElementById('sugestoes');
const anoEl = document.getElementById('ano');

let modelos = [];

// 🔥 CARREGAR MARCAS
async function carregarMarcas() {
  marcaEl.innerHTML = '<option>Carregando...</option>';

  try {
    const res = await fetch(`https://parallelum.com.br/fipe/api/v1/${tipoEl.value}/marcas`);
    const data = await res.json();

    marcaEl.innerHTML = '<option value="">Selecione</option>';

    data.forEach(m => {
      marcaEl.add(new Option(m.nome, m.codigo));
    });

  } catch (e) {
    console.error(e);
    marcaEl.innerHTML = '<option>Erro ao carregar</option>';
  }
}

// 🔥 QUANDO ESCOLHE MARCA
marcaEl.addEventListener('change', async () => {
  modeloEl.disabled = true;
  modeloEl.value = '';
  anoEl.innerHTML = '';
  anoEl.disabled = true;

  if (!marcaEl.value) return;

  try {
    const res = await fetch(`https://parallelum.com.br/fipe/api/v1/${tipoEl.value}/${marcaEl.value}/modelos`);
    const data = await res.json();

    modelos = data.modelos || [];

    modeloEl.disabled = false;

  } catch (e) {
    console.error(e);
  }
});

// 🔥 AUTOCOMPLETE
modeloEl.addEventListener('input', () => {
  const termo = modeloEl.value.toLowerCase();

  const lista = modelos.filter(m =>
    m.nome.toLowerCase().includes(termo)
  );

  sugestoesEl.innerHTML = '';

  lista.slice(0, 20).forEach(m => {
    const div = document.createElement('div');
    div.className = 'suggestion-item';
    div.innerText = m.nome;

    div.onclick = async () => {
      modeloEl.value = m.nome;
      sugestoesEl.style.display = 'none';

      anoEl.innerHTML = '<option>Carregando...</option>';
      anoEl.disabled = true;

      try {
        const res = await fetch(`https://parallelum.com.br/fipe/api/v1/${tipoEl.value}/${marcaEl.value}/${m.codigo}/anos`);
        const anos = await res.json();

        anoEl.innerHTML = '<option value="">Selecione</option>';

        anos.forEach(a => {
          anoEl.add(new Option(a.nome, a.codigo));
        });

        anoEl.disabled = false;

      } catch (e) {
        console.error(e);
      }
    };

    sugestoesEl.appendChild(div);
  });

  sugestoesEl.style.display = lista.length ? 'block' : 'none';
});

// 🔄 TROCAR TIPO
tipoEl.addEventListener('change', () => {
  modeloEl.value = '';
  modeloEl.disabled = true;
  anoEl.innerHTML = '';
  anoEl.disabled = true;
  carregarMarcas();
});

// INICIAR
carregarMarcas();

</script>

</body>
</html>
