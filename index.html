<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Busca Veicular Ultra Rápida</title>

<style>
body { font-family: Arial; background:#f4f4f4; }
.container { max-width:900px; margin:auto; background:#fff; padding:20px; border-radius:10px; }
input, select, button { width:100%; padding:10px; margin:8px 0; }
.relative { position:relative; }
.suggestions { position:absolute; background:#fff; border:1px solid #ccc; max-height:200px; overflow:auto; width:100%; display:none; }
.suggestion-item { padding:6px; cursor:pointer; }
.suggestion-item:hover { background:#007bff; color:#fff; }
</style>
</head>

<body>

<div class="container">

<select id="tipoVeiculo">
  <option value="carros">Carros</option>
</select>

<select id="marca"></select>

<div class="relative">
<input id="modelo" placeholder="Digite modelo (ex: gol, civic)">
<div id="sugestoes" class="suggestions"></div>
</div>

<select id="ano"></select>

<button id="btnBuscar">Consultar</button>

</div>

<script>
// 🔥 LISTA LOCAL (ULTRA RÁPIDO)
const modelosFixos = [
  {nome:"Gol", codigo:"gol"},
  {nome:"Voyage", codigo:"voyage"},
  {nome:"Civic", codigo:"civic"},
  {nome:"Corolla", codigo:"corolla"},
  {nome:"Hilux", codigo:"hilux"},
  {nome:"Onix", codigo:"onix"},
  {nome:"HB20", codigo:"hb20"},
  {nome:"Strada", codigo:"strada"},
  {nome:"Palio", codigo:"palio"},
  {nome:"Uno", codigo:"uno"}
];

// 🔥 BUSCA INSTANTÂNEA
modelo.oninput = () => {
  const termo = modelo.value.toLowerCase();

  const lista = modelosFixos.filter(m =>
    m.nome.toLowerCase().includes(termo)
  );

  sugestoes.innerHTML = '';

  lista.forEach(m => {
    const div = document.createElement('div');
    div.className = 'suggestion-item';
    div.innerText = m.nome;

    div.onclick = () => {
      modelo.value = m.nome;
      sugestoes.style.display = 'none';

      // 🔥 ANOS MOCK (instantâneo)
      ano.innerHTML = `
        <option>2024</option>
        <option>2023</option>
        <option>2022</option>
        <option>2021</option>
      `;
    };

    sugestoes.appendChild(div);
  });

  sugestoes.style.display = lista.length ? 'block' : 'none';
};

// 🔥 MARCAS SIMPLES
marca.innerHTML = `
<option>Volkswagen</option>
<option>Honda</option>
<option>Toyota</option>
<option>Fiat</option>
`;

</script>

</body>
</html>
