<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta Veicular</title>

<style>
body { font-family: Arial; background:#f4f4f4; }
.container { max-width:900px; margin:auto; background:#fff; padding:20px; border-radius:10px; }

input, select {
  width:100%;
  padding:12px;
  margin:10px 0;
  font-size:16px;
}

.relative { position:relative; }

.suggestions {
  position:absolute;
  background:#fff;
  border:1px solid #ccc;
  max-height:200px;
  overflow:auto;
  width:100%;
  display:none;
}

.suggestion-item {
  padding:10px;
  border-bottom:1px solid #eee;
}

.suggestion-item:active {
  background:#007bff;
  color:#fff;
}
</style>
</head>

<body>

<div class="container">

<h2>Consulta Veicular</h2>

<select id="tipo">
  <option value="carros">Carros</option>
  <option value="motos">Motos</option>
  <option value="caminhoes">Caminhões</option>
</select>

<select id="marca"></select>

<div class="relative">
<input id="modelo" placeholder="Digite o modelo..." disabled autocomplete="off">
<div id="sugestoes" class="suggestions"></div>
</div>

<select id="ano" disabled></select>

</div>

<script>
const tipo = document.getElementById('tipo');
const marca = document.getElementById('marca');
const modelo = document.getElementById('modelo');
const sugestoes = document.getElementById('sugestoes');
const ano = document.getElementById('ano');

let modelos = [];

// 🔥 MARCAS
async function carregarMarcas(){
  marca.innerHTML = '<option>Carregando...</option>';

  const res = await fetch(`https://parallelum.com.br/fipe/api/v1/${tipo.value}/marcas`);
  const data = await res.json();

  marca.innerHTML = '<option value="">Selecione a marca</option>';

  data.forEach(m=>{
    marca.add(new Option(m.nome, m.codigo));
  });
}

// 🔥 AO ESCOLHER MARCA
marca.addEventListener('change', async ()=>{
  modelo.value = '';
  modelo.disabled = true;
  sugestoes.style.display = 'none';
  ano.innerHTML = '';
  ano.disabled = true;

  if(!marca.value) return;

  const res = await fetch(`https://parallelum.com.br/fipe/api/v1/${tipo.value}/marcas/${marca.value}/modelos`);
  const data = await res.json();

  modelos = data.modelos || [];

  console.log("Modelos carregados:", modelos.length);

  modelo.disabled = false;
  modelo.focus(); // 🔥 força foco
});

// 🔥 AUTOCOMPLETE CORRIGIDO
modelo.addEventListener('input', ()=>{
  const termo = modelo.value.toLowerCase().trim();

  if(!termo){
    sugestoes.style.display = 'none';
    return;
  }

  const filtrados = modelos.filter(m =>
    m.nome.toLowerCase().includes(termo)
  );

  sugestoes.innerHTML = '';

  filtrados.slice(0,15).forEach(m=>{
    const div = document.createElement('div');
    div.className = 'suggestion-item';
    div.textContent = m.nome;

    div.addEventListener('click', async ()=>{
      modelo.value = m.nome;
      sugestoes.style.display = 'none';

      ano.innerHTML = '<option>Carregando...</option>';

      const res = await fetch(
        `https://parallelum.com.br/fipe/api/v1/${tipo.value}/marcas/${marca.value}/modelos/${m.codigo}/anos`
      );

      const anos = await res.json();

      ano.innerHTML = '';

      anos.forEach(a=>{
        ano.add(new Option(a.nome, a.codigo));
      });

      ano.disabled = false;
    });

    sugestoes.appendChild(div);
  });

  sugestoes.style.display = filtrados.length ? 'block' : 'none';
});

// 🔄 TROCAR TIPO
tipo.addEventListener('change', carregarMarcas);

carregarMarcas();
</script>

</body>
</html>
