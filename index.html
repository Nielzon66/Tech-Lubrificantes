<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tabela de Lubrificantes</title>

<style>

body{
margin:0;
font-family:Arial;
background:#050505;
color:white;
}

.topo{
background:#0d0d0d;
padding:20px;
text-align:center;
font-size:22px;
font-weight:bold;
border-bottom:2px solid #16a36d;
}

.busca{
margin:20px;
background:#2a2a2a;
padding:15px;
border-radius:20px;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin:6px 0;
background:#3b3b3b;
color:white;
font-size:15px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#16a36d;
color:white;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

.lista{
padding:15px;
}

.marcaItem{
display:flex;
align-items:center;
gap:10px;
padding:10px;
border-bottom:1px solid #333;
cursor:pointer;
}

.marcaItem img{
width:35px;
}

.card{
background:#f1f1f1;
color:#000;
border-radius:20px;
padding:20px;
margin-bottom:15px;
}

.visualizar{
margin-top:10px;
background:#16a36d;
border:none;
padding:12px;
width:100%;
border-radius:10px;
color:white;
font-weight:bold;
}

</style>

</head>

<body>

<div class="topo">
BUSCAR VEÍCULO
</div>

<div class="busca">

<div id="listaMarcas"></div>

<input id="modelo" placeholder="Digite o modelo ex: Onix">

<button onclick="buscar()">Pesquisar</button>

</div>

<div class="lista" id="resultado"></div>

<script>

const listaMarcas=document.getElementById("listaMarcas");
const resultado=document.getElementById("resultado");

let marcaSelecionada=null;
let modelos=[];

const logos={

Chevrolet:"https://upload.wikimedia.org/wikipedia/commons/4/4e/Chevrolet_logo.png",
Volkswagen:"https://upload.wikimedia.org/wikipedia/commons/6/6d/Volkswagen_logo_2019.png",
Fiat:"https://upload.wikimedia.org/wikipedia/commons/8/8d/Fiat_logo.svg",
Toyota:"https://upload.wikimedia.org/wikipedia/commons/9/9d/Toyota_carlogo.png",
Honda:"https://upload.wikimedia.org/wikipedia/commons/7/7b/Honda_logo.svg",
Hyundai:"https://upload.wikimedia.org/wikipedia/commons/4/44/Hyundai_Motor_Company_logo.svg",
Renault:"https://upload.wikimedia.org/wikipedia/commons/b/b7/Renault_2021_Text.svg",
Ford:"https://upload.wikimedia.org/wikipedia/commons/3/3e/Ford_logo_flat.svg",
Jeep:"https://upload.wikimedia.org/wikipedia/commons/9/9b/Jeep_logo.svg",
Nissan:"https://upload.wikimedia.org/wikipedia/commons/8/8c/Nissan_logo.png"

};

async function carregarMarcas(){

const r=await fetch("https://parallelum.com.br/fipe/api/v1/carros/marcas");

const data=await r.json();

data.forEach(m=>{

const logo=Object.keys(logos).find(l=>m.nome.includes(l));

if(!logo) return;

listaMarcas.innerHTML+=`

<div class="marcaItem" onclick="selecionarMarca('${m.codigo}','${m.nome}')">

<img src="${logos[logo]}">

${m.nome}

</div>

`;

});

}

async function selecionarMarca(codigo,nome){

marcaSelecionada={codigo,nome};

const r=await fetch(`https://parallelum.com.br/fipe/api/v1/carros/marcas/${codigo}/modelos`);

const data=await r.json();

modelos=data.modelos;

}

function buscar(){

resultado.innerHTML="";

const termo=document.getElementById("modelo").value.toLowerCase();

const filtrados=modelos.filter(m=>m.nome.toLowerCase().includes(termo));

filtrados.slice(0,10).forEach(m=>{

resultado.innerHTML+=`

<div class="card">

<b>${m.nome}</b>

<button class="visualizar" onclick="abrir('${m.nome}')">
VISUALIZAR
</button>

</div>

`;

});

}

function abrir(nome){

localStorage.setItem("veiculo",JSON.stringify({

modelo:nome,
marca:marcaSelecionada.nome

}));

window.location="veiculo.html";

}

carregarMarcas();

</script>

</body>
</html>
