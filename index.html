<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta Veicular PRO</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: #fff;
  margin: 0;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 15px;
}

h2 { text-align: center; }

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 10px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
  background: #0f172a;
  color: #fff;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(45deg,#2563eb,#3b82f6);
  color: #fff;
  font-size: 16px;
  cursor: pointer;
}

button:active { transform: scale(0.97); }

.relative { position: relative; }

.suggestions {
  position: absolute;
  background: #1e293b;
  max-height: 200px;
  overflow: auto;
  width: 100%;
  display: none;
  z-index: 1000;
}

.suggestion-item {
  padding: 10px;
  border-bottom: 1px solid #334155;
}

.suggestion-item:active { background: #2563eb; }

.status {
  text-align: center;
  font-size: 14px;
  margin-bottom: 10px;
}

.error { color: #f87171; }

.result-card {
  margin-top: 15px;
  background: #1e293b;
  border-radius: 12px;
  overflow: hidden;
  animation: fadeIn 0.4s ease;
}

.result-card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.result-content { padding: 15px; }

.result-content h3 { margin: 0 0 10px; }

.result-content p {
  margin: 5px 0;
  font-size: 14px;
}

.badge {
  display: inline-block;
  background: #2563eb;
  padding: 5px 10px;
  border-radius: 6px;
  font-size: 12px;
  margin-top: 5px;
}

@keyframes fadeIn {
  from { opacity:0; transform:translateY(10px); }
  to { opacity:1; transform:translateY(0); }
}
</style>
</head>

<body>

<div class="container">

<h2>🚗 Consulta Veicular PRO</h2>

<div id="status" class="status"></div>

<div class="card">

<select id="tipo">
  <option value="carros">Carros</option>
  <option value="motos">Motos</option>
  <option value="caminhoes">Caminhões</option>
</select>

<select id="marca"></select>

<div class="relative">
<input id="modelo" placeholder="Digite o modelo..." disabled>
<div id="sugestoes" class="suggestions"></div>
</div>

<select id="ano" disabled></select>

<select id="motor">
  <option value="">Selecione o motor</option>
  <option value="1.0">1.0</option>
  <option value="1.4">1.4</option>
  <option value="1.6">1.6</option>
  <option value="2.0">2.0</option>
  <option value="diesel">Diesel</option>
</select>

<select id="marcaFiltro">
  <option value="wega">Wega</option>
  <option value="tecfil">Tecfil</option>
  <option value="fram">Fram</option>
</select>

<button id="btnBuscar">🔍 Consultar</button>

</div>

<div id="resultado"></div>

</div>

<script>

const tipo = document.getElementById('tipo');
const marca = document.getElementById('marca');
const modelo = document.getElementById('modelo');
const sugestoes = document.getElementById('sugestoes');
const ano = document.getElementById('ano');
const status = document.getElementById('status');
const resultado = document.getElementById('resultado');
const marcaFiltro = document.getElementById('marcaFiltro');
const motorEl = document.getElementById('motor');

let modelos = [];

/* MARCAS COMUNS NO BRASIL */
const marcasPermitidas = [
"Chevrolet",
"Volkswagen",
"Fiat",
"Toyota",
"Honda",
"Hyundai",
"Renault",
"Nissan",
"Jeep",
"Peugeot",
"Citroen",
"Ford",
"Mitsubishi",
"Kia",
"Chery",
"Ram",
"Suzuki"
];

function setStatus(msg, erro=false){
  status.innerText = msg;
  status.className = erro ? 'status error' : 'status';
}

async function fetchComBackup(url1, url2){
  try{
    const r1 = await fetch(url1);
    if(!r1.ok) throw "erro1";
    return await r1.json();
  }catch{
    const r2 = await fetch(url2);
    if(!r2.ok) throw "erro2";
    return await r2.json();
  }
}

async function carregarMarcas(){

  setStatus("Carregando marcas...");

  try{

    const data = await fetchComBackup(
      `https://parallelum.com.br/fipe/api/v1/${tipo.value}/marcas`,
      `https://brasilapi.com.br/api/fipe/marcas/v1/${tipo.value}`
    );

    marca.innerHTML = '<option value="">Selecione a marca</option>';

    data
    .filter(m =>
      marcasPermitidas.some(p =>
        m.nome.toLowerCase().includes(p.toLowerCase())
      )
    )
    .forEach(m=>{
      marca.add(new Option(m.nome, m.codigo));
    });

    setStatus("");

  }catch{
    setStatus("Erro ao carregar marcas", true);
  }
}

marca.addEventListener('change', async ()=>{

  modelo.value='';
  modelo.disabled=true;
  sugestoes.style.display='none';
  ano.innerHTML='';
  ano.disabled=true;

  if(!marca.value) return;

  setStatus("Carregando modelos...");

  try{

    const data = await fetchComBackup(
      `https://parallelum.com.br/fipe/api/v1/${tipo.value}/marcas/${marca.value}/modelos`,
      `https://brasilapi.com.br/api/fipe/veiculos/v1/${tipo.value}/${marca.value}`
    );

    modelos = data.modelos || data;

    modelo.disabled=false;

    setStatus("");

  }catch{
    setStatus("Erro ao carregar modelos", true);
  }

});

modelo.addEventListener('input', ()=>{

  const termo = modelo.value.toLowerCase();

  const lista = modelos.filter(m =>
    m.nome.toLowerCase().includes(termo)
  );

  sugestoes.innerHTML='';

  lista.slice(0,10).forEach(m=>{

    const div=document.createElement('div');
    div.className='suggestion-item';
    div.textContent=m.nome;

    div.onclick=async ()=>{

      modelo.value=m.nome;
      sugestoes.style.display='none';

      setStatus("Carregando anos...");

      try{

        const anosData = await fetchComBackup(
          `https://parallelum.com.br/fipe/api/v1/${tipo.value}/marcas/${marca.value}/modelos/${m.codigo}/anos`,
          `https://brasilapi.com.br/api/fipe/veiculo/v1/${tipo.value}/${marca.value}/${m.codigo}`
        );

        const listaAnos = anosData.anos || anosData;

        ano.innerHTML='';

        listaAnos.forEach(a=>{
          ano.add(new Option(a.nome, a.codigo));
        });

        ano.disabled=false;

        setStatus("");

      }catch{
        setStatus("Erro ao carregar anos", true);
      }

    };

    sugestoes.appendChild(div);

  });

  sugestoes.style.display = lista.length ? 'block' : 'none';

});

document.getElementById('btnBuscar').addEventListener('click', ()=>{

  const marcaNome = marca.options[marca.selectedIndex]?.text;
  const modeloNome = modelo.value;
  const anoNome = ano.options[ano.selectedIndex]?.text;
  const filtro = marcaFiltro.value;
  const motor = motorEl.value;

  if(!marca.value || !modeloNome || !ano.value || !motor){
    alert("Preencha todos os campos");
    return;
  }

  const oleoLitros = {
    "1.0": "3.0L",
    "1.4": "3.5L",
    "1.6": "4.0L",
    "2.0": "4.5L",
    "diesel": "6.0L"
  };

  const litros = oleoLitros[motor] || "-";

  const imagem = `https://tse1.mm.bing.net/th?q=${marcaNome}+${modeloNome}+${anoNome}+carro+brasil`;

  resultado.innerHTML = `
  <div class="result-card">
    <img src="${imagem}">
    <div class="result-content">
      <h3>${marcaNome} ${modeloNome}</h3>
      <p>Ano: ${anoNome}</p>
      <p>Motor: ${motor}</p>
      <p>🛢️ Óleo: 5W-30</p>
      <p>Quantidade: ${litros}</p>

      <span class="badge">Troca óleo: 10.000 km</span><br>
      <span class="badge">Troca filtros: 15.000 km</span>
    </div>
  </div>
  `;

});

tipo.addEventListener('change', carregarMarcas);

carregarMarcas();

</script>

</body>
</html>
