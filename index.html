<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta Veicular</title>
<style>
body { font-family: Arial, sans-serif; background:#f4f4f4; margin:0; padding:0; }
header { background:#222; color:white; padding:15px; text-align:center; }
.container { max-width:900px; margin:30px auto; background:white; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1); }
select, button { width:100%; padding:10px; margin:8px 0; border-radius:5px; border:1px solid #ccc; }
button { background:#007bff; color:white; border:none; cursor:pointer; }
button:disabled { background:#999; cursor:not-allowed; }
.result { margin-top:20px; padding:15px; background:#e9ecef; border-radius:8px; white-space:pre-wrap; }
</style>
</head>
<body>
<header><h1>Consulta Veicular</h1></header>

<div class="container">
<label>Marca:</label>
<select id="marca"><option value="">Carregando marcas...</option></select>

<label>Modelo:</label>
<select id="modelo" disabled><option value="">Selecione uma marca primeiro</option></select>

<label>Ano:</label>
<select id="ano" disabled><option value="">Selecione o modelo primeiro</option></select>

<label>Motor:</label>
<select id="motor" disabled><option value="">Selecione o ano primeiro</option></select>

<button id="btnBuscar" onclick="buscarInfo()" disabled>Consultar Especificações</button>
<div class="result" id="resultado"></div>
</div>

<script>
// API pública FIPE
const API = "https://deividfortuna.github.io/fipe/v2/carros";

// Carregar marcas da FIPE
async function carregarMarcas() {
    const sel = document.getElementById('marca');
    sel.innerHTML = '<option value="">Carregando marcas...</option>';
    const res = await fetch(`${API}/marcas`);
    const marcas = await res.json();
    sel.innerHTML = '<option value="">Selecione uma marca...</option>';
    marcas.forEach(m => sel.appendChild(new Option(m.nome, m.codigo)));
    sel.disabled = false;
}

// Carregar modelos
async function carregarModelos() {
    const marca = document.getElementById('marca').value;
    const selM = document.getElementById('modelo');
    const selA = document.getElementById('ano');
    selM.innerHTML = '<option value="">Carregando...</option>';
    selA.innerHTML = '<option value="">---</option>';
    document.getElementById('motor').innerHTML = '<option value="">---</option>';
    document.getElementById('btnBuscar').disabled = true;

    if (!marca) { selM.disabled = true; return; }

    const r = await fetch(`${API}/${marca}/modelos`);
    const d = await r.json();
    selM.innerHTML = '<option value="">Selecione o modelo...</option>';
    d.modelos.forEach(m => selM.appendChild(new Option(m.nome, m.codigo)));
    selM.disabled = false;
}

// Carregar anos
async function carregarAnos() {
    const marca = document.getElementById('marca').value;
    const mod = document.getElementById('modelo').value;
    const selA = document.getElementById('ano');
    selA.innerHTML = '<option value="">Carregando anos...</option>';
    document.getElementById('motor').innerHTML = '<option value="">---</option>';
    document.getElementById('btnBuscar').disabled = true;

    if (!mod) { selA.disabled = true; return; }

    const r = await fetch(`${API}/${marca}/modelos/${mod}/anos`);
    const anos = await r.json();
    selA.innerHTML = '<option value="">Selecione o ano...</option>';
    anos.forEach(a => selA.appendChild(new Option(a.nome, a.codigo)));
    selA.disabled = false;
}

// Carregar motores (simulado)
function carregarMotores() {
    const sel = document.getElementById('motor');
    const motores = ['1.0','1.2','1.4','1.6','2.0','Turbo'];
    sel.innerHTML = '<option value="">Selecione motor...</option>';
    motores.forEach(m => sel.appendChild(new Option(m, m)));
    sel.disabled = false;
    document.getElementById('btnBuscar').disabled = true;
}

// Habilitar botão
function checarPronto() {
    document.getElementById('btnBuscar').disabled = !document.getElementById('motor').value;
}

// Mostrar resultado
function buscarInfo() {
    const Mar = document.getElementById('marca').selectedOptions[0].text;
    const Mod = document.getElementById('modelo').selectedOptions[0].text;
    const Ano = document.getElementById('ano').selectedOptions[0].text;
    const Mot = document.getElementById('motor').value;
    document.getElementById('resultado').innerText =
        `Marca: ${Mar}\nModelo: ${Mod}\nAno: ${Ano}\nMotor: ${Mot}`;
}

//Eventos
window.onload = carregarMarcas;
document.getElementById('marca').addEventListener('change', carregarModelos);
document.getElementById('modelo').addEventListener('change', carregarAnos);
document.getElementById('ano').addEventListener('change', carregarMotores);
document.getElementById('motor').addEventListener('change', checarPronto);
</script>
</body>
</html>
