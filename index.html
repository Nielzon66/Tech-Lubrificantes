<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta Veicular Avançada</title>

<style>
body { font-family: Arial; background:#f4f4f4; }
.container { max-width:900px; margin:auto; background:#fff; padding:20px; border-radius:10px; }
input, select, button { width:100%; padding:10px; margin:8px 0; }
.suggestions { position:absolute; background:#fff; border:1px solid #ccc; display:none; max-height:200px; overflow:auto; }
.suggestion-item { padding:5px; cursor:pointer; }
.suggestion-item:hover { background:#007bff; color:#fff; }
.relative { position:relative; }
</style>
</head>

<body>

<div class="container">

<select id="tipoVeiculo">
  <option value="carros">Carros</option>
  <option value="motos">Motos</option>
</select>

<select id="marca"></select>

<div class="relative">
<input id="modelo" placeholder="Digite modelo">
<div id="sugestoes" class="suggestions"></div>
</div>

<select id="motor">
  <option value="">Motor</option>
  <option>1.0</option>
  <option>1.6</option>
</select>

<div id="anoContainer">
<select id="ano" disabled></select>
</div>

<button id="btnBuscar" disabled>Consultar</button>

</div>

<script>
let modelosData = {};
let marcasData = {};

async function carregarMarcas() {
  const tipo = tipoVeiculo.value;
  const res = await fetch(`https://parallelum.com.br/fipe/api/v1/${tipo}/marcas`);
  const data = await res.json();

  marca.innerHTML = '<option value="">Marca</option>';

  data.forEach(m => {
    marca.add(new Option(m.nome, m.codigo));
    marcasData[m.codigo] = m.nome;
  });
}

modelo.oninput = async () => {
  if (!marca.value) return;

  const tipo = tipoVeiculo.value;

  if (!modelosData[marca.value]) {
    const res = await fetch(`https://parallelum.com.br/fipe/api/v1/${tipo}/${marca.value}/modelos`);
    const data = await res.json();
    modelosData[marca.value] = data.modelos;
  }

  const lista = modelosData[marca.value]
    .filter(m => m.nome.toLowerCase().includes(modelo.value.toLowerCase()));

  sugestoes.innerHTML = '';

  lista.forEach(m => {
    const div = document.createElement('div');
    div.className = 'suggestion-item';
    div.innerText = m.nome;

    div.onclick = async () => {
      modelo.value = m.nome;
      sugestoes.style.display = 'none';

      const res = await fetch(`https://parallelum.com.br/fipe/api/v1/${tipo}/${marca.value}/${m.codigo}/anos`);
      const anos = await res.json();

      console.log("ANOS:", anos); // DEBUG

      // 🔥 recria o select inteiro (resolve bug)
      const container = document.getElementById('anoContainer');
      container.innerHTML = '<select id="ano"></select>';

      const novoSelect = document.getElementById('ano');

      anos.forEach(a => {
        novoSelect.add(new Option(a.nome, a.codigo));
      });

      // 🔥 força seleção real
      if (anos.length > 0) {
        novoSelect.selectedIndex = 0;
      }

      novoSelect.onchange = checar;

      checar();
    };

    sugestoes.appendChild(div);
  });

  sugestoes.style.display = lista.length ? 'block' : 'none';
};

function checar() {
  const ano = document.getElementById('ano');

  btnBuscar.disabled = !(
    marca.value &&
    modelo.value &&
    motor.value &&
    ano && ano.value
  );
}

motor.onchange = checar;

btnBuscar.onclick = () => {
  const ano = document.getElementById('ano');

  alert(`OK:
${marcasData[marca.value]}
${modelo.value}
${ano.value}`);
};

tipoVeiculo.onchange = carregarMarcas;

marca.onchange = () => {
  modelo.value = '';
  document.getElementById('anoContainer').innerHTML = '<select id="ano" disabled></select>';
};

carregarMarcas();
</script>

</body>
</html>
