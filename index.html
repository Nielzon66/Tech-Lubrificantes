<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta Veicular Avançada</title>

<style>
body { font-family: Arial, sans-serif; background:#f4f4f4; margin:0; padding:0; }
header { background:#222; color:white; padding:15px; text-align:center; }
.container { max-width:900px; margin:30px auto; background:white; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1); }
input, select, button { width:100%; padding:10px; margin:8px 0; border-radius:5px; border:1px solid #ccc; box-sizing:border-box; }
button { background:#007bff; color:white; border:none; cursor:pointer; }
button:disabled { background:#999; cursor:not-allowed; }
.result { margin-top:20px; padding:15px; background:#e9ecef; border-radius:8px; white-space:pre-wrap; }
.relative { position:relative; }
.suggestions { border:1px solid #ccc; background:white; max-height:250px; overflow-y:auto; position:absolute; z-index:1000; width:100%; display:none; }
.suggestion-item { padding:5px; cursor:pointer; }
.suggestion-item:hover { background:#007bff; color:white; }
.filter-row { display:flex; gap:10px; flex-wrap:wrap; }
.filter-row select { flex:1; }
</style>
</head>

<body>
<header><h1>Consulta Veicular Avançada</h1></header>

<div class="container">

<label>Tipo de veículo:</label>
<select id="tipoVeiculo">
  <option value="carros">Carros</option>
  <option value="caminhoes">Caminhões</option>
  <option value="motos">Motos</option>
</select>

<label>Marca:</label>
<select id="marca"></select>

<label>Modelo:</label>
<div class="relative">
<input type="text" id="modelo" placeholder="Digite o modelo..." autocomplete="off">
<div id="sugestoes" class="suggestions"></div>
</div>

<div class="filter-row">
<div>
<label>Motor:</label>
<select id="motor">
  <option value="">Selecione o motor...</option>
  <option value="1.0">1.0</option>
  <option value="1.2">1.2</option>
  <option value="1.4">1.4</option>
  <option value="1.6">1.6</option>
  <option value="2.0">2.0</option>
  <option value="2.8">2.8</option>
  <option value="3.2">3.2</option>
  <option value="Turbo">Turbo</option>
</select>
</div>

<div>
<label>Ano:</label>
<select id="ano" disabled></select>
</div>
</div>

<button id="btnBuscar" disabled>Consultar Especificações</button>

<div class="result" id="resultado"></div>

</div>

<script>
const filtrosMarcas = ['Tecfil','Wega','Fram'];
let marcasData = {};
let modelosData = {};
let anosData = {};
let modeloSelecionadoCodigo = null;

async function carregarMarcas() {
  const tipo = document.getElementById('tipoVeiculo').value;
  const sel = document.getElementById('marca');

  sel.innerHTML = '<option>Carregando...</option>';

  try {
    const res = await fetch(`https://brasilapi.com.br/api/fipe/marcas/v1/${tipo}`);
    const marcas = await res.json();

    sel.innerHTML = '<option value="">Selecione...</option>';

    marcas.forEach(m => {
      sel.appendChild(new Option(m.nome, m.codigo));
      marcasData[m.codigo] = m.nome;
    });

  } catch(e) {
    console.error(e);
    sel.innerHTML = '<option>Erro ao carregar</option>';
  }
}

const modeloInput = document.getElementById('modelo');
const sugestoesBox = document.getElementById('sugestoes');

modeloInput.addEventListener('input', async () => {
  const tipo = document.getElementById('tipoVeiculo').value;
  const marcaCodigo = document.getElementById('marca').value;

  if (!marcaCodigo) return;

  if (!modelosData[marcaCodigo]) {
    try {
      const res = await fetch(`https://brasilapi.com.br/api/fipe/veiculos/v1/${tipo}/${marcaCodigo}`);
      const data = await res.json();
      modelosData[marcaCodigo] = data.modelos;
    } catch(e) {
      console.error(e);
      return;
    }
  }

  const termo = modeloInput.value.toLowerCase();

  const filtrados = modelosData[marcaCodigo]
    .filter(m => m.nome.toLowerCase().includes(termo))
    .slice(0, 20);

  sugestoesBox.innerHTML = '';

  if (filtrados.length && termo.length > 0) {
    filtrados.forEach(m => {
      const div = document.createElement('div');
      div.className = 'suggestion-item';
      div.textContent = m.nome;

      div.onclick = async () => {
        modeloInput.value = m.nome;
        modeloSelecionadoCodigo = m.codigo;

        await carregarAnos(tipo, marcaCodigo, m.codigo);

        sugestoesBox.style.display = 'none';
      };

      sugestoesBox.appendChild(div);
    });

    sugestoesBox.style.display = 'block';
  } else {
    sugestoesBox.style.display = 'none';
  }
});

async function carregarAnos(tipo, marca, modelo) {
  const selAno = document.getElementById('ano');

  selAno.innerHTML = '<option>Carregando...</option>';
  selAno.disabled = true;

  try {
    const res = await fetch(`https://brasilapi.com.br/api/fipe/veiculos/v1/${tipo}/${marca}/${modelo}`);
    const anos = await res.json();

    selAno.innerHTML = '<option value="">Selecione...</option>';

    anos.forEach(a => {
      selAno.appendChild(new Option(a.nome, a.codigo));
    });

    selAno.disabled = false;

  } catch(e) {
    console.error(e);
    selAno.innerHTML = '<option>Erro</option>';
  }
}

function checarPronto() {
  const motor = document.getElementById('motor').value;
  const ano = document.getElementById('ano').value;
  const modelo = modeloInput.value;
  const marca = document.getElementById('marca').value;

  document.getElementById('btnBuscar').disabled =
    !(motor && ano && modelo && marca);
}

document.getElementById('motor').addEventListener('change', checarPronto);
document.getElementById('ano').addEventListener('change', checarPronto);

document.getElementById('btnBuscar').onclick = () => {
  const tipo = document.getElementById('tipoVeiculo').value;
  const marca = marcasData[document.getElementById('marca').value];
  const modelo = modeloInput.value;
  const ano = document.getElementById('ano').value;
  const motor = document.getElementById('motor').value;

  let texto = `Tipo: ${tipo}
Marca: ${marca}
Modelo: ${modelo}
Ano: ${ano}
Motor: ${motor}

`;

  filtrosMarcas.forEach(f => {
    texto += `--- ${f} ---
Óleo: 5W-30
Ar: ${f}
Combustível: ${f}
Cabine: ${f}

`;
  });

  texto += `Troca de óleo: 10.000 km
Troca de filtros: 15.000 km`;

  document.getElementById('resultado').innerText = texto;
};

document.getElementById('tipoVeiculo').onchange = () => {
  modeloInput.value = '';
  document.getElementById('ano').innerHTML = '';
  document.getElementById('ano').disabled = true;
  carregarMarcas();
};

document.getElementById('marca').onchange = () => {
  modeloInput.value = '';
  document.getElementById('ano').innerHTML = '';
  document.getElementById('ano').disabled = true;
};

carregarMarcas();
</script>

</body>
</html>
