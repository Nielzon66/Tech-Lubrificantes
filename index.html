<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Consulta Veicular</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:#fff;
margin:0;
}

.container{
max-width:900px;
margin:auto;
padding:15px;
}

h2{
text-align:center;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-bottom:10px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:none;
background:#0f172a;
color:#fff;
}

button{
width:100%;
padding:14px;
border-radius:10px;
border:none;
background:linear-gradient(45deg,#2563eb,#3b82f6);
color:#fff;
font-size:16px;
cursor:pointer;
}

.marca-lista{
max-height:200px;
overflow:auto;
}

.marca-item{
display:flex;
align-items:center;
gap:10px;
padding:10px;
border-bottom:1px solid #334155;
cursor:pointer;
}

.marca-item img{
width:30px;
}

.marca-item:hover{
background:#2563eb;
}

.veiculos{
display:flex;
flex-direction:column;
gap:10px;
margin-top:10px;
}

.veiculo-card{
background:#1e293b;
padding:15px;
border-radius:10px;
cursor:pointer;
transition:.2s;
}

.veiculo-card:hover{
background:#2563eb;
}

.result-card{
margin-top:15px;
background:#1e293b;
border-radius:12px;
overflow:hidden;
}

.result-card img{
width:100%;
height:220px;
object-fit:cover;
}

.result-content{
padding:15px;
}

.voltar{
margin-top:10px;
background:#334155;
}

.loader{
border:4px solid #334155;
border-top:4px solid #3b82f6;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

</style>
</head>

<body>

<div class="container">

<h2>🚗 Consulta Veicular</h2>

<div class="card">

<input id="buscaMarca" placeholder="Digite a marca...">

<div id="listaMarcas" class="marca-lista"></div>

<input id="buscaModelo" placeholder="Digite o modelo..." disabled>

<div id="veiculos" class="veiculos"></div>

</div>

<div id="paginaVeiculo"></div>

</div>

<script>

const buscaMarca = document.getElementById("buscaMarca")
const listaMarcas = document.getElementById("listaMarcas")
const buscaModelo = document.getElementById("buscaModelo")
const veiculos = document.getElementById("veiculos")
const paginaVeiculo = document.getElementById("paginaVeiculo")

let marcas=[]
let modelos=[]
let marcaSelecionada=null

async function carregarMarcas(){

const r=await fetch("https://parallelum.com.br/fipe/api/v1/carros/marcas")
marcas=await r.json()

mostrarMarcas(marcas)

}

function mostrarMarcas(lista){

listaMarcas.innerHTML=""

lista.forEach(m=>{

const logo=`https://tse2.mm.bing.net/th?q=${m.nome}+logo`

const div=document.createElement("div")
div.className="marca-item"

div.innerHTML=`
<img src="${logo}">
<span>${m.nome}</span>
`

div.onclick=()=>selecionarMarca(m)

listaMarcas.appendChild(div)

})

}

buscaMarca.addEventListener("input",()=>{

const termo=buscaMarca.value.toLowerCase()

const filtrado=marcas.filter(m=>
m.nome.toLowerCase().includes(termo)
)

mostrarMarcas(filtrado)

})

async function selecionarMarca(m){

marcaSelecionada=m
buscaMarca.value=m.nome
listaMarcas.innerHTML=""

buscaModelo.disabled=false

veiculos.innerHTML='<div class="loader"></div>'

const r=await fetch(`https://parallelum.com.br/fipe/api/v1/carros/marcas/${m.codigo}/modelos`)
const data=await r.json()

modelos=data.modelos

veiculos.innerHTML=""

}

buscaModelo.addEventListener("input",()=>{

const termo=buscaModelo.value.toLowerCase()

const lista=modelos.filter(m=>
m.nome.toLowerCase().includes(termo)
)

veiculos.innerHTML=""

lista.slice(0,10).forEach(m=>{

const div=document.createElement("div")
div.className="veiculo-card"

div.innerHTML=`
🚗 ${m.nome}
`

div.onclick=()=>abrirVeiculo(m)

veiculos.appendChild(div)

})

})

async function abrirVeiculo(m){

veiculos.innerHTML='<div class="loader"></div>'

const r=await fetch(`https://parallelum.com.br/fipe/api/v1/carros/marcas/${marcaSelecionada.codigo}/modelos/${m.codigo}/anos`)
const anos=await r.json()

const ano=anos[0]

const r2=await fetch(`https://parallelum.com.br/fipe/api/v1/carros/marcas/${marcaSelecionada.codigo}/modelos/${m.codigo}/anos/${ano.codigo}`)
const info=await r2.json()

const imagem=`https://tse1.mm.bing.net/th?q=${marcaSelecionada.nome}+${m.nome}+carro`

paginaVeiculo.innerHTML=`

<div class="result-card">

<img src="${imagem}">

<div class="result-content">

<h3>${marcaSelecionada.nome} ${m.nome}</h3>

<p>Ano: ${info.AnoModelo}</p>
<p>Combustível: ${info.Combustivel}</p>
<p>Código FIPE: ${info.CodigoFipe}</p>
<p>Valor médio: ${info.Valor}</p>

<button class="voltar" onclick="voltar()">⬅ Voltar</button>

</div>

</div>

`

veiculos.innerHTML=""

}

function voltar(){

paginaVeiculo.innerHTML=""
veiculos.innerHTML=""

}

carregarMarcas()

</script>

</body>
</html>
