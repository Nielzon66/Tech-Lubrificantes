<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta Veicular Online</title>

<style>
body { font-family: Arial; background:#f4f4f4; }
.container { max-width:900px; margin:auto; background:#fff; padding:20px; border-radius:10px; }
input, select { width:100%; padding:10px; margin:8px 0; }
.relative { position:relative; }
.suggestions {
  position:absolute; background:#fff; border:1px solid #ccc;
  max-height:250px; overflow:auto; width:100%; display:none;
}
.suggestion-item { padding:6px; cursor:pointer; }
.suggestion-item:hover { background:#007bff; color:#fff; }
</style>
</head>

<body>

<div class="container">

<h2>Consulta Veicular (Online)</h2>

<label>Tipo</label>
<select id="tipo">
  <option value="carros">Carros</option>
  <option value="motos">Motos</option>
  <option value="caminhoes">Caminhões</option>
</select>

<label>Marca</label>
<select id="marca"></select>

<label>Modelo</label>
<div class="relative">
<input id="modelo" placeholder="Digite o modelo..." disabled>
<div id="sugestoes" class="suggestions"></div>
</div>

<label>Ano</label>
<select id="ano" disabled></select>

</div>

<script>
let modelos = [];

// 🔥 CARREGAR MARCAS
async function carregarMarcas() {
  const tipo = tipo.value;
  marca.innerHTML = '<option>Carregando...</option>';

  try {
    const res = await fetch(`https://parallelum.com.br/fipe/api/v1/${tipo}/marcas`);
    const data = await res.json();

    marca.innerHTML = '<option value="">Selecione</option>';

    data.forEach(m => {
      marca.add(new Option(m.nome, m.codigo));
    });

  } catch (e) {
    marca.innerHTML = '<option>Erro</option>';
  }
}

// 🔥 AO ESCOLHER MARCA
marca.onchange = async () => {
  modelo.disabled = true;
  modelo.value = '';
  ano.innerHTML = '';
  ano.disabled = true;

  if (!marca.value) return;

  const tipo = tipoVeiculo.value || tipo.value;

  try {
    const res = await fetch(`https://parallelum.com.br/fipe/api/v1/${tipo}/${marca.value}/modelos`);
    const data = await res.json();

    modelos = data.modelos || [];

    modelo.disabled = false;

  } catch (e) {
    console.error(e);
  }
};

// 🔥 AUTOCOMPLETE CORRETO
modelo.oninput = () => {
  const termo = modelo.value.toLowerCase();

  const lista = modelos.filter(m =>
    m.nome.toLowerCase().includes(termo)
  );

  sugestoes.innerHTML = '';

  lista.slice(0, 20).forEach(m => {
    const div = document.createElement('div');
    div.className = 'suggestion-item';
    div.innerText = m.nome;

    div.onclick = async () => {
      modelo.value = m.nome;
      sugestoes.style.display = 'none';

      ano.innerHTML = '<option>Carregando...</option>';
      ano.disabled = true;

      const tipo = document.getElementById('tipo').value;

      const res = await fetch(`https://parallelum.com.br/fipe/api/v1/${tipo}/${marca.value}/${m.codigo}/anos`);
      const anos = await res.json();

      ano.innerHTML = '<option value="">Selecione</option>';

      anos.forEach(a => {
        ano.add(new Option(a.nome, a.codigo));
      });

      ano.disabled = false;
    };

    sugestoes.appendChild(div);
  });

  sugestoes.style.display = lista.length ? 'block' : 'none';
};

// 🔄 TROCAR TIPO
tipo.onchange = () => {
  modelo.value = '';
  modelo.disabled = true;
  ano.innerHTML = '';
  ano.disabled = true;
  carregarMarcas();
};

// INICIAR
carregarMarcas();
</script>

</body>
</html>
